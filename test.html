<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบกรอบ — สวัสดีวันนี้</title>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Charm:wght@700&family=Sarabun:wght@400;600;700&family=Kanit:wght@600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:#ece0c8;color:#2b2118;padding:16px 12px 60px}
  h1{font-family:'Chonburi';font-size:20px;text-align:center;margin-bottom:4px}
  .lead{font-size:14px;text-align:center;color:#6b4c1e;line-height:1.5;margin-bottom:6px}
  .hint{font-size:13px;text-align:center;color:#7a6040;background:#fffbf0;border:1.5px solid #e8d8b0;
        border-radius:12px;padding:8px 12px;max-width:520px;margin:0 auto 18px;line-height:1.55}
  .frame-block{max-width:520px;margin:0 auto 26px;background:#fff7ea;border:1px solid #e3d4b0;
        border-radius:16px;padding:14px}
  .fb-title{font-family:'Kanit';font-size:17px;font-weight:600;margin-bottom:12px;color:#5a3e1e}
  .fb-title .num{color:#b8893b}
  .lbl{font-size:12px;font-weight:700;color:#7a6040;margin:2px 0 6px}
  .lbl.ok{color:#1b8a3a}
  .holder{width:min(86vw,300px);margin:0 auto 4px;box-shadow:0 0 0 1px rgba(0,0,0,.06);border-radius:20px}
  .card{position:relative;width:100%;height:100%;border-radius:20px;overflow:hidden;
        background:linear-gradient(135deg,#7b9acc 0%,#c98fb0 55%,#e9b96a 100%)}
  .scrim{position:absolute;inset:0;z-index:1;
        background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,0) 45%,rgba(0,0,0,.55) 100%)}
  .content{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;color:#fff}
  .tb{display:flex;flex-direction:column;gap:6px;max-width:92%}
  .hello{font-family:'Chonburi';line-height:1.12;text-shadow:0 2px 10px rgba(0,0,0,.5)}
  .bless{font-family:'Charm';font-weight:700;line-height:1.4;text-shadow:0 1px 8px rgba(0,0,0,.55)}
  .cap-img{width:100%;height:100%;border-radius:20px;display:block}
  .testbar{max-width:520px;margin:0 auto 18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .testbar button{font-family:'Kanit';font-size:14px;font-weight:600;border:none;border-radius:12px;
        padding:11px 18px;cursor:pointer;background:linear-gradient(135deg,#b8893b,#e7c46a);color:#3a2410}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2b2118;color:#fff;
        padding:10px 18px;border-radius:22px;font-family:'Kanit';font-size:14px;opacity:0;transition:.25s;z-index:99}
  .toast.on{opacity:1}
</style>
</head>
<body>
  <h1>ตรวจสอบกรอบ 14 แบบ ☀️</h1>
  <div class="lead">เทียบ "ภาพที่เห็นบนเว็บ" กับ "ภาพที่บันทึก/คัดลอก (ผ่าน html2canvas)"</div>
  <div class="hint">
    การ์ดในหน้านี้ใช้ขนาดและฟอนต์เท่ากับแอปจริง<br>
    ถ้ากรอบ "บนเว็บ" กับ "ที่บันทึก" เหมือนกัน และตัวหนังสือไม่โดนกรอบทับ = ผ่าน ✓<br>
    เปิดทั้งในเบราว์เซอร์ปกติและใน LINE แล้วลองปุ่ม <b>คัดลอก / บันทึก</b> ด้านล่าง
  </div>

  <div class="testbar">
    <button id="btnCopy">📋 ทดสอบคัดลอก (กรอบ #1)</button>
    <button id="btnSave">⬇️ ทดสอบบันทึก (กรอบ #1)</button>
  </div>

  <div id="grid"></div>
  <div class="toast" id="toast"></div>

<script>
/* ====== โค้ดกรอบชุดเดียวกับใน index.html ====== */
/* ── FRAMES (กรอบภาพ) ──────────────────────────────────────────────────
   หลักการสำคัญ: ทุกกรอบสร้างจาก <div> ล้วน ๆ (เส้น / แถบ / มุมประดับ / เงาขอบ)
   ซึ่ง html2canvas render ออกมาได้ "ตรงกับที่เห็นบนเว็บ 100%"
   → ภาพที่แสดงบนเว็บ = ภาพที่ copy = ภาพที่ save = ภาพใน LINE เหมือนกันเป๊ะ
   จงหลีกเลี่ยง box-shadow เรืองแสง / filter / backdrop / clip-path / mask
   เพราะ html2canvas จับไม่ได้ → จะทำให้ภาพ "ที่เห็น" กับ "ที่บันทึก" ไม่ตรงกัน

   schema ของแต่ละกรอบ:
     n:  ชื่อกรอบ
     fi: ระยะ "ขอบในของกรอบ" (px) — ข้อความ/เนื้อหาจะถูกดันให้อยู่ในช่องกลาง
         ไม่ให้ตัวหนังสือไปทับแถบกรอบ (สำคัญกับกรอบหนา เช่น โพลารอยด์/ฟิล์ม/ไม้)
     layers: [
       {line:1,  inset, w, color, style?, radius?}   เส้นกรอบ (solid/dashed/double)
       {bevel:'out'|'in', inset, w, light, dark, radius?}  ขอบนูน/จม 3 มิติ
       {shadow:1, inset, depth, color}               เงาขอบด้านในแบบ 3 มิติ (ภาพดูจมลง)
       {band:1,  inset, w, bg}                        แถบทึบ (เช่น ขอบขาวโพลารอยด์/ฟิล์มดำ)
     ]
     corners: {t:'bracket'|'steps'|'dots'|'petals', inset, size, w, gap, r, color, color2}
──────────────────────────────────────────────────────────────────────── */
const FRAMES=[
  // 1) ทองคลาสสิก 3 ชั้น
  {n:'ทองคลาสสิก', fi:24, layers:[
    {line:1,inset:8, w:3,  color:'#ffd700', radius:12},
    {line:1,inset:14,w:1.5,color:'#ffe9a8', radius:7},
    {line:1,inset:18,w:1,  color:'#b8860b', radius:4},
  ]},
  // 2) อาร์ตเดโคทอง (วินเทจ Gen-X) — มุมเหลี่ยมซ้อนชั้น
  {n:'อาร์ตเดโคทอง', fi:24, layers:[
    {line:1,inset:11,w:2,color:'#e8c25a',radius:0},
  ], corners:{t:'steps',inset:11,size:32,w:3,gap:5,color:'#ffd700',color2:'#b8860b'}},
  // 3) ทองเมทัลลิกนูน
  {n:'ทองเมทัลลิก', fi:24, layers:[
    {bevel:'out',inset:9,w:7,light:'#ffe9a8',dark:'#9a7b1e',radius:6},
    {line:1,inset:18,w:1,color:'#fff3c4',radius:2},
  ]},
  // 4) 3D นูน (เงิน)
  {n:'3D นูนเงิน', fi:25, layers:[
    {bevel:'out',inset:9,w:8,light:'#ffffff',dark:'#6d6d6d',radius:8},
    {line:1,inset:19,w:1,color:'rgba(255,255,255,.55)',radius:4},
  ]},
  // 5) 3D จม (ภาพดูถูกกดลงไป)
  {n:'3D จม', fi:23, layers:[
    {bevel:'in',inset:9,w:8,light:'#ffffff',dark:'#4d4d4d',radius:8},
  ]},
  // 6) เงาลึกสามมิติ — ภาพดูจมเข้าไปในกรอบหน้าต่าง
  {n:'เงาลึก 3 มิติ', fi:22, layers:[
    {shadow:1,inset:0,depth:30,color:'rgba(0,0,0,.55)'},
    {line:1,inset:11,w:1.5,color:'rgba(255,255,255,.6)',radius:12},
  ]},
  // 7) โพลารอยด์ขาว (ขอบขาวหนาแบบรูปถ่าย)
  {n:'โพลารอยด์ขาว', fi:32, layers:[
    {band:1,inset:10,w:15,bg:'#ffffff'},
    {line:1,inset:25,w:1,color:'#d8d0bf',radius:0},
  ]},
  // 8) ฟิล์มขอบดำ (ซีเนมา)
  {n:'ฟิล์มขอบดำ', fi:26, layers:[
    {band:1,inset:0,w:18,bg:'#121212'},
    {line:1,inset:18,w:1.5,color:'#e8c25a',radius:0},
  ]},
  // 9) กรอบไม้ (นูน)
  {n:'กรอบไม้', fi:28, layers:[
    {bevel:'out',inset:9,w:12,light:'#a1887f',dark:'#5d4037',radius:3},
    {line:1,inset:21,w:1,color:'#4e342e',radius:0},
  ]},
  // 10) แดงทองมงคล — มุมประดับหมุดทอง
  {n:'แดงทองมงคล', fi:22, layers:[
    {line:1,inset:8, w:5,  color:'#c0392b',radius:5},
    {line:1,inset:15,w:1.5,color:'#ffd700',radius:2},
  ], corners:{t:'dots',inset:9,r:4,color:'#ffd700'}},
  // 11) นีออนฟ้า — halo แบบแถบทึบโปร่งแสง (ไม่ใช้ box-shadow)
  {n:'นีออนฟ้า', fi:22, layers:[
    {line:1,inset:9, w:5,color:'rgba(0,229,255,.22)',radius:14},
    {line:1,inset:14,w:2,color:'#00e5ff',radius:9},
  ]},
  // 12) ชมพูดอกไม้ — มุมกลีบดอก
  {n:'ชมพูดอกไม้', fi:20, layers:[
    {line:1,inset:10,w:3,color:'#ffb6c1',radius:16},
  ], corners:{t:'petals',inset:11,r:4,color:'#ff8fab',color2:'#ffd6e0'}},
  // 13) ไทยกนกมุม — มุมลายไทยซ้อนชั้น
  {n:'ไทยกนกมุม', fi:24, layers:[
    {line:1,inset:10,w:2,color:'#e8c060',radius:0},
  ], corners:{t:'steps',inset:10,size:34,w:3,gap:6,color:'#e8c060',color2:'#b8860b'}},
  // 14) ขาวเรียบหรู (โมเดิร์น เส้นคู่บาง)
  {n:'ขาวเรียบหรู', fi:24, layers:[
    {line:1,inset:12,w:1.5,color:'#ffffff',radius:14},
    {line:1,inset:18,w:1.5,color:'rgba(255,255,255,.45)',radius:10},
  ]},
];


/* ── helper: อ่านตัวเลข (รองรับ 0 และ default) ── */
const fNum=(v,d)=>{const n=parseFloat(v);return isNaN(n)?(d||0):n;};

/* ── สร้างมุมประดับจาก <div> ล้วน ๆ (html2canvas render ตรง) ── */
function buildCorners(card, spec){
  const t     = spec.t,
        ins    = fNum(spec.inset, 8),
        size   = fNum(spec.size, 30),
        w      = fNum(spec.w, 3),
        gap    = fNum(spec.gap, 5),
        r      = fNum(spec.r, 5),
        color  = spec.color  || '#ffd700',
        color2 = spec.color2 || color;
  const fc=(css)=>{
    const d=document.createElement('div');
    d.className='fcorner';
    d.style.cssText='position:absolute;pointer-events:none;z-index:6;'+css;
    card.appendChild(d);
  };
  // มุมทั้ง 4 — ยึดขอบด้วย top/bottom + left/right จึงไม่ต้องใช้ transform
  const corners=[['top','left'],['top','right'],['bottom','left'],['bottom','right']];
  corners.forEach(([vy,hx])=>{
    if(t==='bracket' || t==='steps'){
      const offs = (t==='steps') ? [0, gap+w] : [0];
      offs.forEach((off,i)=>{
        const sz = size - i*(gap+w);
        if(sz<=w) return;
        const col = i ? color2 : color;
        fc(`${vy}:${ins+off}px;${hx}:${ins+off}px;width:${sz}px;height:${w}px;background:${col}`);
        fc(`${vy}:${ins+off}px;${hx}:${ins+off}px;width:${w}px;height:${sz}px;background:${col}`);
      });
    } else if(t==='dots' || t==='petals'){
      const cnt = (t==='petals') ? 4 : 3;
      for(let i=0;i<cnt;i++){
        const off = ins + i*(r*2+3);
        const col = (t==='petals' && (i%2)) ? color2 : color;
        fc(`${vy}:${off}px;${hx}:${ins}px;width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col}`);
        if(t==='petals' && i>0)
          fc(`${vy}:${ins}px;${hx}:${off}px;width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col}`);
      }
    }
  });
}

/* ── ใส่กรอบลงการ์ด — ทุกชิ้นเป็น <div> ที่ html2canvas จับได้ตรง ──────────
   จึงได้ภาพ "เหมือนที่เห็นบนเว็บ" ทั้งตอนแสดง / copy / save / ใน LINE ──────── */
function applyFrameToCard(card, fr){
  // ล้างกรอบเก่า (รองรับทั้ง schema เก่าและใหม่)
  card.querySelectorAll('.frame-layer,.fcorner,.frame-border,.frame-inner,.corner')
      .forEach(e=>e.remove());

  // กรอบทั้งหมดอยู่ "ในกรอบสี่เหลี่ยม" → ไม่ใช้ outer glow บน .cw
  // (outer glow จะถูก html2canvas ตัดทิ้ง ทำให้ภาพที่เห็น ≠ ภาพที่บันทึก)
  const cw=card.parentElement;
  if(cw && cw.classList.contains('cw')) cw.dataset.outerShadow='';
  card.style.boxShadow='none';
  if(!fr) return;

  const add=(css)=>{
    const d=document.createElement('div');
    d.className='frame-layer';
    d.style.cssText='position:absolute;pointer-events:none;z-index:4;'+css;
    card.appendChild(d);
  };
  const sides=(ins)=>`top:${ins}px;right:${ins}px;bottom:${ins}px;left:${ins}px`;

  (fr.layers||[]).forEach(L=>{
    const ins=fNum(L.inset);
    if(L.line){
      // เส้นกรอบ (box-sizing:border-box → เส้นวาดด้านในของกล่อง = อยู่ที่ inset พอดี)
      add(`${sides(ins)};border:${fNum(L.w,1)}px ${L.style||'solid'} ${L.color};border-radius:${fNum(L.radius)}px`);
    } else if(L.bevel){
      // ขอบ 3 มิติ: ด้านสว่าง (บน-ซ้าย) + ด้านมืด (ล่าง-ขวา) → นูน ; สลับกัน → จม
      const lt = (L.bevel==='out') ? L.light : L.dark;
      const dk = (L.bevel==='out') ? L.dark  : L.light;
      add(`${sides(ins)};border-style:solid;border-width:${fNum(L.w,4)}px;`+
          `border-top-color:${lt};border-left-color:${lt};`+
          `border-right-color:${dk};border-bottom-color:${dk};`+
          `border-radius:${fNum(L.radius)}px`);
    } else if(L.shadow){
      // เงาขอบด้านใน 4 ด้าน (gradient จากขอบเข้มจางเข้ากลาง) → ภาพดูจมเป็น 3 มิติ
      const d=fNum(L.depth,24), c=L.color||'rgba(0,0,0,.5)';
      add(`left:${ins}px;right:${ins}px;top:${ins}px;height:${d}px;background:linear-gradient(180deg,${c},rgba(0,0,0,0))`);
      add(`left:${ins}px;right:${ins}px;bottom:${ins}px;height:${d}px;background:linear-gradient(0deg,${c},rgba(0,0,0,0))`);
      add(`top:${ins}px;bottom:${ins}px;left:${ins}px;width:${d}px;background:linear-gradient(90deg,${c},rgba(0,0,0,0))`);
      add(`top:${ins}px;bottom:${ins}px;right:${ins}px;width:${d}px;background:linear-gradient(270deg,${c},rgba(0,0,0,0))`);
    } else if(L.band){
      // แถบทึบเป็นวง (4 แท่งขอบ) — เช่น ขอบขาวโพลารอยด์ / ฟิล์มดำ
      const t=fNum(L.w,12), bg=L.bg||'#ffffff';
      add(`left:${ins}px;right:${ins}px;top:${ins}px;height:${t}px;background:${bg}`);
      add(`left:${ins}px;right:${ins}px;bottom:${ins}px;height:${t}px;background:${bg}`);
      add(`top:${ins}px;bottom:${ins}px;left:${ins}px;width:${t}px;background:${bg}`);
      add(`top:${ins}px;bottom:${ins}px;right:${ins}px;width:${t}px;background:${bg}`);
    }
  });

  if(fr.corners) buildCorners(card, fr.corners);
}


/* ============================================== */

function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2200);}

// padding>=fi เหมือน buildCard ในแอปจริง (top,right,bottom,left)
function padFor(fi, size){
  const r=[0.07,0.075,0.095,0.075];
  return r.map(x=>Math.max(Math.round(size*x), fi)+'px').join(' ');
}

function buildSampleCard(fr, size){
  const card=document.createElement('div');card.className='card';
  const sc=document.createElement('div');sc.className='scrim';card.appendChild(sc);
  applyFrameToCard(card, fr);
  const fi=parseFloat(fr.fi)||18;
  const content=document.createElement('div');content.className='content';
  content.style.justifyContent='center';
  content.style.alignItems='center';
  content.style.textAlign='center';
  content.style.padding=padFor(fi, size);
  const tb=document.createElement('div');tb.className='tb';tb.style.alignItems='center';
  const h=document.createElement('div');h.className='hello';
  h.style.fontSize=Math.round(size*0.108)+'px';h.textContent='สวัสดีวันนี้';
  const b=document.createElement('div');b.className='bless';
  b.style.fontSize=Math.round(size*0.056)+'px';b.textContent='ขอให้เป็นวันที่สดใส';
  tb.append(h,b);content.appendChild(tb);card.appendChild(content);
  return card;
}

async function renderAll(){
  // รอฟอนต์ให้พร้อมก่อน เพื่อให้ภาพที่จับ (html2canvas) ตรงกับที่เห็น
  if(document.fonts && document.fonts.ready){
    try{ await Promise.race([document.fonts.ready, new Promise(r=>setTimeout(r,3000))]); }catch(e){}
  }
  const grid=document.getElementById('grid');
  for(let i=0;i<FRAMES.length;i++){
    const fr=FRAMES[i];
    const block=document.createElement('div');block.className='frame-block';
    block.innerHTML='<div class="fb-title"><span class="num">#'+(i+1)+'</span> '+fr.n+'</div>'+
                    '<div class="lbl">บนเว็บ</div>';

    const h1=document.createElement('div');h1.className='holder';
    block.appendChild(h1);
    const lbl2=document.createElement('div');lbl2.className='lbl ok';lbl2.textContent='ที่บันทึก/คัดลอก';
    block.appendChild(lbl2);
    const h2=document.createElement('div');h2.className='holder';
    block.appendChild(h2);
    grid.appendChild(block);

    // ทำให้สูง = กว้าง (สี่เหลี่ยมจัตุรัส)
    const size=h1.clientWidth;
    h1.style.height=size+'px';h2.style.height=size+'px';

    const liveCard=buildSampleCard(fr, size);
    h1.appendChild(liveCard);

    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    try{
      const canvas=await html2canvas(liveCard,{scale:2,backgroundColor:null,logging:false,useCORS:true});
      const img=document.createElement('img');img.className='cap-img';img.src=canvas.toDataURL('image/png');
      h2.appendChild(img);
      if(i===0) window.__firstCanvas=canvas;
    }catch(e){
      h2.innerHTML='<div style="font-size:12px;color:#c0392b;padding:20px">จับภาพไม่สำเร็จ: '+e.message+'</div>';
    }
  }
}

document.getElementById('btnCopy').onclick=async()=>{
  const c=window.__firstCanvas;if(!c){toast('ยังโหลดไม่เสร็จ');return;}
  try{
    if(window.ClipboardItem && navigator.clipboard?.write){
      c.toBlob(async b=>{
        try{await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);toast('คัดลอกสำเร็จ ✓ ลองวางใน LINE');}
        catch(e){toast('คัดลอกไม่ได้ในสภาพแวดล้อมนี้');}
      },'image/png');
    }else toast('เบราว์เซอร์นี้ไม่รองรับการคัดลอกรูป (ใช้บันทึกแทน)');
  }catch(e){toast('ผิดพลาด: '+e.message);}
};
document.getElementById('btnSave').onclick=()=>{
  const c=window.__firstCanvas;if(!c){toast('ยังโหลดไม่เสร็จ');return;}
  const a=document.createElement('a');a.download='ทดสอบกรอบ.png';a.href=c.toDataURL('image/png');a.click();
  toast('บันทึกแล้ว ✓ (หรือกดค้างที่รูปใน LINE)');
};

window.addEventListener('load',()=>setTimeout(renderAll,300));
</script>
