<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กำลังปรับปรุงระบบ</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #333;
    }

    .container {
        max-width: 700px;
        width: 100%;
        text-align: center;
        background: white;
        border-radius: 24px;
        padding: 40px 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .illustration {
        width: 260px;
        max-width: 100%;
        margin: 0 auto 24px;
    }

    h1 {
        font-size: clamp(28px, 5vw, 42px);
        color: #d35400;
        margin-bottom: 16px;
    }

    p {
        font-size: 18px;
        line-height: 1.8;
        color: #555;
    }

    .highlight {
        font-weight: bold;
        color: #2c3e50;
    }

    .footer {
        margin-top: 30px;
        font-size: 15px;
        color: #888;
    }
</style>
</head>

<body>

<div class="container">

    <div class="illustration">
        <svg viewBox="0 0 300 240" width="100%">
            <!-- Shadow -->
            <ellipse cx="150" cy="210" rx="70" ry="15" fill="#e6e6e6"/>

            <!-- Body -->
            <g transform="rotate(20 150 120)">
                <rect x="110" y="90" width="80" height="90" rx="12" fill="#1f5fbf"/>

                <!-- Head -->
                <circle cx="150" cy="70" r="30" fill="#ffd7b3"/>

                <!-- Hair -->
                <path d="M120 70
                         C120 40 180 40 180 70
                         L180 60
                         C180 25 120 25 120 60Z"
                      fill="#333"/>

                <!-- Arms -->
                <rect x="95" y="100" width="25" height="70" rx="10" fill="#1f5fbf"/>
                <rect x="180" y="100" width="25" height="70" rx="10" fill="#1f5fbf"/>

                <!-- Hands -->
                <circle cx="108" cy="170" r="10" fill="#ffd7b3"/>
                <circle cx="192" cy="170" r="10" fill="#ffd7b3"/>

                <!-- Legs -->
                <rect x="120" y="175" width="22" height="45" rx="8" fill="#444"/>
                <rect x="158" y="175" width="22" height="45" rx="8" fill="#444"/>
            </g>
        </svg>
    </div>

    <h1>ขออภัยในความไม่สะดวก</h1>

    <p>
        เว็บไซต์ <span class="highlight">สวัสดีวันนี้</span><br>
        กำลังอยู่ระหว่างการปรับปรุงและพัฒนาระบบ
    </p>

    <p style="margin-top:16px;">
        เพื่อให้ทุกท่านได้รับประสบการณ์การใช้งานที่ดียิ่งขึ้น
        เราจะกลับมาเปิดให้บริการอีกครั้งในเร็ว ๆ นี้
    </p>

    <div class="footer">
        ขอบพระคุณทุกท่านที่ให้การสนับสนุนและรอคอย ❤️
    </div>

</div>

</body>
</html>
