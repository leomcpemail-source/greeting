name: LINE Morning Greeting

on:
  workflow_dispatch: {}          # กดรันเองเพื่อทดสอบได้
  schedule:
    # 23:00 UTC = 06:00 ตามเวลาไทย (UTC+7)
    # หมายเหตุ: cron ของ GitHub อาจคลาดเคลื่อนได้ไม่กี่นาที — ปกติสำหรับคำทักทายตอนเช้า
    - cron: '0 23 * * *'

# กันรอบส่งซ้อนกัน
concurrency:
  group: line-morning
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Send morning greeting to LINE friends
        run: node scripts/line_morning.mjs
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
