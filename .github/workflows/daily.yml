name: Daily Greeting Generation

on:
  schedule:
    - cron: '15 17 * * *'      # 00:15 เวลาไทย (17:15 UTC)
  workflow_dispatch:           # กดรันเองได้จากหน้า Actions
    inputs:
      composite:
        description: 'ตรวจภาพประกอบจริง (รูป+กรอบ+ข้อความ) ด้วย headless browser'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-greeting
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ติดตั้ง jpeg-js (วิเคราะห์พื้นที่ว่างของภาพ เพื่อวางข้อความไม่บังจุดสำคัญ) — เบา ใช้ทุกครั้ง
      - name: Install jpeg-js
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i jpeg-js

      # ติดตั้ง Puppeteer + Chromium เฉพาะตอนเปิดโหมด composite (กดรันเองแล้วติ๊ก composite)
      - name: Install Puppeteer + Chromium (composite mode only)
        if: ${{ github.event.inputs.composite == 'true' }}
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i puppeteer@23
          npx puppeteer browsers install chrome

      - name: Generate images + blessings
        run: node scripts/generate.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # เปิด composite เฉพาะเมื่อกดรันเองและติ๊ก composite=true (ตารางอัตโนมัติ = ปิดเสมอ)
          COMPOSITE_SCORING: ${{ github.event.inputs.composite == 'true' && '1' || '0' }}

      - name: Publish to daily-images branch (single commit, no history bloat)
        run: |
          cd output
          git init -q
          git config user.name "greeting-bot"
          git config user.email "greeting-bot@users.noreply.github.com"
          git checkout -q -b daily-images
          git add -A
          git commit -q -m "daily greetings $(date -u +%F_%H:%M)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" daily-images
