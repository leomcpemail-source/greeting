name: Daily Greeting Generation

on:
  workflow_dispatch: {}            # กดรันเองได้
  schedule:
    # รันทุก ~90 นาที (16 รอบ/วัน) เวลา UTC — สคริปต์คำนวณ "วันเป้าหมาย" จากเวลาไทยเอง
    # (cutoff = เที่ยงคืน -> ทุกรอบสร้างชุดของ "พรุ่งนี้" ; freeze ตอนเที่ยงคืน)
    - cron: '0 0 * * *'
    - cron: '30 1 * * *'
    - cron: '0 3 * * *'
    - cron: '30 4 * * *'
    - cron: '0 6 * * *'
    - cron: '30 7 * * *'
    - cron: '0 9 * * *'
    - cron: '30 10 * * *'
    - cron: '0 12 * * *'
    - cron: '30 13 * * *'
    - cron: '0 15 * * *'
    - cron: '30 16 * * *'
    - cron: '0 18 * * *'
    - cron: '30 19 * * *'
    - cron: '0 21 * * *'
    - cron: '30 22 * * *'

permissions:
  contents: write

# กันรอบชนกัน: ถ้ารอบก่อนยังรันอยู่ รอบใหม่จะ "รอ" (ไม่ยกเลิกของเดิม)
concurrency:
  group: daily-greeting
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 88            # < 90 (cron spacing); สคริปต์ self-stop ~85 นาที
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      # ดึงรูปสะสมเดิมจาก branch daily-images มาที่ ./output เพื่อทำงานต่อ (rolling)
      - name: Checkout image branch -> output
        uses: actions/checkout@v4
        with:
          ref: daily-images
          path: output
        continue-on-error: true     # รอบแรกสุดที่ branch ยังไม่มี

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # composite เป็นทางหลักแล้ว (รูปสำเร็จ) — ติดตั้ง Puppeteer/Chromium + jpeg-js ทุกครั้ง
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-thai-tlwg fonts-noto-color-emoji || true
          npm init -y >/dev/null 2>&1 || true
          npm i jpeg-js puppeteer@23
          npx puppeteer browsers install chrome

      - name: Generate (rolling, self-stops ~85 min)
        run: node scripts/generate.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # จำเป็น: secret key (sk_) จาก enter.pollinations.ai — เปิดให้ gen รูป + vision ฝั่ง Pollinations ทำงาน
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          # ออปชัน: ใส่คีย์เพื่อเปิดรูปถ่าย royalty-free (ดอกไม้/ต้นไม้/สถานที่) จาก Pexels
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CAT_TARGET: '30'          # รูปขั้นต่ำต่อหมวด/วัน (รวม ~360/วัน = 12 หมวด) — อย่าใส่ TARGET ทับ ไม่งั้นเป้ารายหมวดเพี้ยน
          RUN_BUDGET_MS: '5100000'  # 85 นาที
          OUT_ROOT: 'output/img'
          PHOTO_SHARE: '0.50'          # Pollen กลับมาแล้ว (มิ.ย.2569) — AI gen 50%, Pexels 50% ; ตั้ง '1.0' ถ้า Pollen หมดอีก
          USE_POLL_VISION: '1'         # เปิด vision Pollinations (Pollen กลับมาแล้ว มิ.ย.2569) — ปิดด้วย '0' ถ้า Pollen หมดอีก

      # publish: บีบเป็น commit เดียว (orphan) แล้ว force-push — ไม่มี history bloat แต่คงไฟล์สะสมไว้
      - name: Publish to daily-images branch
        working-directory: output
        run: |
          git init -q
          git config user.name "greeting-bot"
          git config user.email "greeting-bot@users.noreply.github.com"
          git add -A
          git checkout -q --orphan _pub 2>/dev/null || git checkout -q -b _pub
          git add -A
          git commit -q -m "daily greetings $(date -u +%F_%H:%M)" || { echo "nothing to commit"; exit 0; }
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" _pub:daily-images
