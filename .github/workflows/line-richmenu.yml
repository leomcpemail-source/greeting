name: LINE Rich Menu Install

# ติดตั้ง/อัปเดต Rich Menu ของ LINE OA — กดรันเองเมื่ออยากติดตั้งหรือเปลี่ยนรูป
# ต้องมีรูป 2 ไฟล์ใน repo ก่อน: assets/richmenu/main.png และ assets/richmenu/categories.png
# (ดูสเปกรูปใน LINE_SETUP.md — ขนาด 2500×1686, ไฟล์ ≤ 1MB)

on:
  workflow_dispatch: {}

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install rich menu
        run: node scripts/line_richmenu.mjs
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          # ออปชัน: ถ้า URL เว็บแอพไม่ใช่ค่าเริ่มต้น ให้ตั้ง APP_URL เป็น repository variable
          APP_URL: ${{ vars.APP_URL }}
