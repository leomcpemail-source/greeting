<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เทียบรูปสวัสดี — AI gen vs Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Charm:wght@400;700&family=Sarabun:wght@400;600;700&family=Kanit:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#2b2118; --paper:#f6efe3; --paper2:#efe5d2; --gold:#b8893b; --gold2:#e7c46a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Sarabun',sans-serif; color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #fff8ec 0%, transparent 60%),
      linear-gradient(160deg,#f3e9d6 0%, #ece0c8 100%);
    min-height:100vh; padding:18px 14px 40px; line-height:1.5;
  }
  .wrap{max-width:560px;margin:0 auto}
  .top{text-align:center;margin-bottom:18px}
  .top .mark{font-family:'Kanit';letter-spacing:.18em;font-size:11px;color:var(--gold);text-transform:uppercase}
  .top h1{font-family:'Chonburi';font-size:25px;color:var(--ink);margin:4px 0 2px}
  .top p{font-size:13px;color:#7a6a52}

  .panel{background:rgba(255,255,255,.55);border:1px solid #e3d4b6;border-radius:18px;padding:14px;margin-bottom:16px;
    backdrop-filter:blur(6px);box-shadow:0 8px 24px rgba(120,90,40,.08)}
  .lbl{font-family:'Kanit';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9a8765;margin-bottom:8px}

  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .day{border:1px solid #e0d0b0;background:#fff;border-radius:12px;padding:8px 0;text-align:center;cursor:pointer;
    font-family:'Kanit';font-size:13px;transition:.18s;user-select:none}
  .day b{display:block;font-size:15px}
  .day small{font-size:9px;color:#9a8765;font-weight:600}
  .day.on{color:#fff;border-color:transparent;transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.18)}

  .tabs{display:flex;gap:8px;margin-top:14px}
  .tab{flex:1;border:1px solid #e0d0b0;background:#fff;border-radius:12px;padding:11px;text-align:center;cursor:pointer;
    font-family:'Kanit';font-size:14px;transition:.18s}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab span{display:block;font-size:10px;color:#a08a6a;font-weight:400;margin-top:2px}
  .tab.on span{color:#d9c79f}

  .stage{margin:18px auto 0;width:100%;max-width:420px}
  .card{position:relative;width:100%;aspect-ratio:1/1;border-radius:18px;overflow:hidden;
    box-shadow:0 18px 40px rgba(80,50,10,.28);background:#000}
  .card img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .scrim{position:absolute;inset:0}
  /* gold frame */
  .frame{position:absolute;inset:14px;border:2px solid rgba(255,255,255,.85);border-radius:10px;pointer-events:none}
  .frame:before{content:"";position:absolute;inset:5px;border:1px solid rgba(255,255,255,.55);border-radius:7px}
  .corner{position:absolute;width:46px;height:46px;opacity:.95}
  .corner.tl{top:6px;left:6px}.corner.tr{top:6px;right:6px;transform:scaleX(-1)}
  .corner.bl{bottom:6px;left:6px;transform:scaleY(-1)}.corner.br{bottom:6px;right:6px;transform:scale(-1)}

  .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 30px;z-index:3}
  .sub{font-family:'Kanit';font-size:13px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:6px}
  .hello{font-family:'Chonburi';font-size:38px;line-height:1.15;margin-bottom:14px;
    text-shadow:0 2px 10px rgba(0,0,0,.35), 0 0 1px rgba(0,0,0,.4)}
  .bless{font-family:'Charm';font-weight:700;font-size:21px;line-height:1.45;max-width:88%;
    text-shadow:0 1px 6px rgba(0,0,0,.4)}
  .date{font-family:'Sarabun';font-size:12px;margin-top:16px;opacity:.92;letter-spacing:.04em}
  .sparkle{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px rgba(255,255,255,.8);z-index:2}

  .actions{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-family:'Kanit';font-size:14px;cursor:pointer;transition:.18s}
  .btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3a2a10;font-weight:600}
  .btn.ghost{background:#fff;border:1px solid #e0d0b0;color:var(--ink)}
  .btn:active{transform:scale(.97)}
  .hint{text-align:center;font-size:12px;color:#8a795f;margin-top:14px;line-height:1.6}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;
    background:rgba(20,15,5,.55);color:#fff;font-family:'Kanit';font-size:14px;gap:10px}
  .spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="mark">Daily Greeting Lab</div>
    <h1>เทียบรูปสวัสดี</h1>
    <p>เลือกวัน แล้วสลับดู AI gen กับ Template — ตัวหนังสือไทยคมทั้งคู่</p>
  </div>

  <div class="panel">
    <div class="lbl">เลือกวัน</div>
    <div class="days" id="days"></div>

    <div class="tabs">
      <div class="tab on" data-mode="ai" id="tabAi">AI gen<span>พื้นหลังสดจาก Pollinations</span></div>
      <div class="tab" data-mode="tpl" id="tabTpl">Template<span>วาดเองด้วยโค้ด</span></div>
    </div>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <img class="bg" id="bg" alt="">
      <div class="scrim" id="scrim"></div>
      <div class="frame">
        <svg class="corner tl" viewBox="0 0 50 50"><path d="M2 48 Q2 2 48 2" fill="none" stroke="#fff" stroke-width="1.4"/><path d="M8 48 Q8 8 48 8" fill="none" stroke="#fff" stroke-width="1" opacity=".6"/><circle cx="14" cy="14" r="2.4" fill="#fff"/><path d="M14 14 q10 -4 18 0 q-8 6 -18 0" fill="#fff" opacity=".85"/></svg>
        <svg class="corner tr" viewBox="0 0 50 50"><path d="M2 48 Q2 2 48 2" fill="none" stroke="#fff" stroke-width="1.4"/><path d="M8 48 Q8 8 48 8" fill="none" stroke="#fff" stroke-width="1" opacity=".6"/><circle cx="14" cy="14" r="2.4" fill="#fff"/><path d="M14 14 q10 -4 18 0 q-8 6 -18 0" fill="#fff" opacity=".85"/></svg>
        <svg class="corner bl" viewBox="0 0 50 50"><path d="M2 48 Q2 2 48 2" fill="none" stroke="#fff" stroke-width="1.4"/><path d="M8 48 Q8 8 48 8" fill="none" stroke="#fff" stroke-width="1" opacity=".6"/><circle cx="14" cy="14" r="2.4" fill="#fff"/><path d="M14 14 q10 -4 18 0 q-8 6 -18 0" fill="#fff" opacity=".85"/></svg>
        <svg class="corner br" viewBox="0 0 50 50"><path d="M2 48 Q2 2 48 2" fill="none" stroke="#fff" stroke-width="1.4"/><path d="M8 48 Q8 8 48 8" fill="none" stroke="#fff" stroke-width="1" opacity=".6"/><circle cx="14" cy="14" r="2.4" fill="#fff"/><path d="M14 14 q10 -4 18 0 q-8 6 -18 0" fill="#fff" opacity=".85"/></svg>
      </div>
      <div class="content" id="content">
        <div class="sub" id="sub">Good Morning</div>
        <div class="hello" id="hello">สวัสดี</div>
        <div class="bless" id="bless"></div>
        <div class="date" id="date"></div>
      </div>
      <div class="loading" id="loading" style="display:none"><div class="spin"></div>กำลังสร้างพื้นหลัง…</div>
    </div>

    <div class="actions">
      <button class="btn ghost" id="regen">🔁 สุ่มใหม่</button>
      <button class="btn primary" id="dl">⬇ ดาวน์โหลด</button>
    </div>
    <div class="hint">💡 ลองสลับ AI/Template หลายๆ วัน แล้วเทียบว่าแบบไหน “เหมือนรูปที่เขาส่งกัน” มากกว่า</div>
  </div>
</div>

<script>
const DAYS = [
  {th:'อาทิตย์', s:'อา', en:'Sunday',    color:'#C0392B', c2:'#7d1f17', flower:'red roses and red hibiscus'},
  {th:'จันทร์',  s:'จ',  en:'Monday',    color:'#E1A100', c2:'#8a5d00', flower:'yellow marigold and chrysanthemum'},
  {th:'อังคาร', s:'อ',  en:'Tuesday',   color:'#D6336C', c2:'#8a1d44', flower:'pink lotus and pink peony'},
  {th:'พุธ',     s:'พ',  en:'Wednesday', color:'#1E9E55', c2:'#0f5e31', flower:'white jasmine on lush green leaves'},
  {th:'พฤหัสบดี',s:'พฤ', en:'Thursday',  color:'#E8730C', c2:'#9c4a05', flower:'orange marigold garland'},
  {th:'ศุกร์',   s:'ศ',  en:'Friday',    color:'#1F73C4', c2:'#0f4677', flower:'blue morning glory and forget-me-nots'},
  {th:'เสาร์',   s:'ส',  en:'Saturday',  color:'#7E3FAE', c2:'#4a2069', flower:'purple orchids and lavender'},
];
const BLESS = [
  'ขอให้มีความสุข สุขภาพแข็งแรง',
  'โชคดีมีชัย ตลอดทั้งวัน',
  'คิดสิ่งใดสมหวัง ดังใจปรารถนา',
  'ร่ำรวยเงินทอง สุขกายสบายใจ',
  'เดินทางปลอดภัย แคล้วคลาดทุกสิ่ง',
  'รอยยิ้มสดใส มีแต่สิ่งดีๆ เข้ามา',
];
const THAI_MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

let mode='ai';
let dayIdx=new Date().getDay();
let seed=Math.floor(Math.random()*99999);
let blessIdx=Math.floor(Math.random()*BLESS.length);

const $=id=>document.getElementById(id);

function buildDays(){
  $('days').innerHTML='';
  DAYS.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='day'+(i===dayIdx?' on':'');
    if(i===dayIdx){el.style.background=`linear-gradient(135deg,${d.color},${d.c2})`;}
    el.innerHTML=`<b>${d.s}</b><small>${d.en.slice(0,3)}</small>`;
    el.onclick=()=>{dayIdx=i;seed=Math.floor(Math.random()*99999);buildDays();render();};
    $('days').appendChild(el);
  });
}

function thaiDate(){
  const n=new Date();
  return `วัน${DAYS[dayIdx].th} ที่ ${n.getDate()} ${THAI_MONTHS[n.getMonth()]} ${n.getFullYear()+543}`;
}

function placeSparkles(){
  document.querySelectorAll('.sparkle').forEach(s=>s.remove());
  const card=$('card');
  for(let i=0;i<7;i++){
    const s=document.createElement('div');s.className='sparkle';
    s.style.left=(8+Math.random()*84)+'%';s.style.top=(8+Math.random()*84)+'%';
    s.style.opacity=(0.4+Math.random()*0.6);s.style.transform=`scale(${0.6+Math.random()})`;
    card.appendChild(s);
  }
}

function render(){
  const d=DAYS[dayIdx];
  $('sub').textContent='Good Morning';
  $('hello').textContent='สวัสดีวัน'+d.th;
  $('bless').textContent=BLESS[blessIdx];
  $('date').textContent=thaiDate();
  // text color: white everywhere for readability over imagery/strong colors
  ['sub','hello','bless','date'].forEach(k=>$(k).style.color='#fff');
  $('sub').style.color='rgba(255,255,255,.9)';

  if(mode==='ai'){
    $('loading').style.display='flex';
    $('loading').innerHTML='<div class="spin"></div>กำลังสร้างพื้นหลัง…';
    const prompt=`elegant ${d.flower}, soft golden morning sunlight, dewdrops, dreamy bokeh, ${d.en} auspicious greeting card background, serene, highly detailed, photographic, vertical, no text no words no letters`;
    const img=$('bg');
    img.style.display='block';
    let tries=0;
    const load=()=>{
      tries++;
      const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=900&height=900&nologo=true&model=flux&referrer=greetinglab&seed=${seed+tries}`;
      let done=false;
      const timer=setTimeout(()=>{ if(!done){ img.onerror(); } },20000);
      img.onload=()=>{done=true;clearTimeout(timer);$('loading').style.display='none';};
      img.onerror=()=>{
        done=true;clearTimeout(timer);
        if(tries<2){ load(); }
        else{ $('loading').innerHTML='โหลดรูปไม่สำเร็จ<br><span style="font-size:11px;opacity:.85">เปิดไฟล์ในเบราว์เซอร์ปกติ/GitHub Pages จะโหลดได้<br>(preview ในแอปบล็อกรูปจากเน็ต)</span>'; }
      };
      img.src=url;
    };
    load();
    // dark scrim for legibility + day-color tint
    $('scrim').style.background=`linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,.0) 35%, rgba(0,0,0,.1) 60%, rgba(0,0,0,.55) 100%), radial-gradient(120% 90% at 50% 40%, ${hexA(d.color,.05)} 0%, ${hexA(d.c2,.35)} 100%)`;
  }else{
    $('loading').style.display='none';
    $('bg').style.display='none';
    // designed background: radial light + day gradient + sunburst rays + vignette
    $('scrim').style.background=`
      radial-gradient(80% 60% at 50% 30%, ${tint(d.color,40)} 0%, ${d.color} 45%, ${d.c2} 100%),
      repeating-conic-gradient(from 0deg at 50% 38%, rgba(255,255,255,.06) 0deg 3deg, transparent 3deg 9deg)`;
    $('scrim').style.boxShadow='inset 0 0 120px rgba(0,0,0,.45)';
  }
  placeSparkles();
}

function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function tint(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16&255)+amt,g=(n>>8&255)+amt,b=(n&255)+amt;
  r=Math.min(255,r);g=Math.min(255,g);b=Math.min(255,b);return `rgb(${r},${g},${b})`;}

$('tabAi').onclick=()=>{mode='ai';$('tabAi').classList.add('on');$('tabTpl').classList.remove('on');render();};
$('tabTpl').onclick=()=>{mode='tpl';$('tabTpl').classList.add('on');$('tabAi').classList.remove('on');render();};
$('regen').onclick=()=>{seed=Math.floor(Math.random()*99999);blessIdx=Math.floor(Math.random()*BLESS.length);render();};

$('dl').onclick=async()=>{
  const btn=$('dl');const t=btn.textContent;btn.textContent='กำลังบันทึก…';btn.disabled=true;
  try{
    const canvas=await html2canvas($('card'),{useCORS:true,scale:2,backgroundColor:null,logging:false});
    const a=document.createElement('a');
    a.download=`สวัสดีวัน${DAYS[dayIdx].th}_${mode}.png`;
    a.href=canvas.toDataURL('image/png');a.click();
  }catch(e){
    alert('บันทึกไม่ได้ (รูป AI อาจติด CORS) — ลองแคปหน้าจอแทน หรือใช้แบบ Template');
  }finally{btn.textContent=t;btn.disabled=false;}
};

buildDays();render();
</script>
</body>
</html>
