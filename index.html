<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>สวัสดีวันนี้ ☀️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Charm:wght@400;700&family=Mitr:wght@500;600&family=Kanit:wght@400;600&family=Itim&family=Mali:wght@600&family=Sriracha&family=Pattaya&family=Bai+Jamjuree:wght@600&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script data-goatcounter="https://leomcpemail.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#e91e8c;--pink2:#ff6bb5;
  --green:#1a8a3a;--green2:#22a847;   /* ปุ่มสีเขียวตามภาพ */
  --line-green:#06c755;
  --text:#2d1a2e;--text2:#888;
  --white:#ffffff;
  --cream:#fff8ee;                    /* พื้น date box */
  --cream-border:#f5dfc0;
  --tab-h:60px;
}
html,body{
  height:100%;height:100dvh;overflow:hidden;
  font-family:'Sarabun',sans-serif;color:var(--text);
  background:#fff;
  overscroll-behavior:none;
}

/* ── APP SHELL ── */
.app{
  display:flex;flex-direction:column;
  height:100%;height:100dvh;
  max-width:480px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* ── PAGE SYSTEM ── */
.page{
  position:absolute;inset:0;bottom:var(--tab-h);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .3s;
  will-change:transform;
}
.page.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.page.active{transform:translateX(0);opacity:1;}

/* ── TAB BAR ── */
.tab-bar{
  position:absolute;bottom:0;left:0;right:0;
  height:var(--tab-h);
  background:#fff;
  border-top:1px solid #f0e0ee;
  display:flex;align-items:stretch;
  padding-bottom:max(0px, env(safe-area-inset-bottom));
  z-index:100;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  border:none;background:none;cursor:pointer;
  font-family:'Sarabun';font-size:13px;font-weight:600;
  color:#bbb;transition:color .2s;
  padding:0;
}
.tab-btn .tab-icon{font-size:24px;line-height:1;transition:transform .2s;}
.tab-btn.active{color:var(--pink);}
.tab-btn.active .tab-icon{transform:scale(1.1);}

/* ─────────────────────────── PAGE: TODAY ─────────────────────────── */
#pageToday{background:#fff;}

/* Header — เหมือนภาพ: ☀️ ซ้าย + title + subtitle */
.today-header{
  flex-shrink:0;
  background:#fff;
  padding:max(14px,env(safe-area-inset-top)) 16px 10px;
  border-bottom:none;
}
.today-header-row{display:flex;align-items:center;gap:10px;}
.header-sun{
  font-size:38px;line-height:1;flex-shrink:0;
  /* ☀️ emoji ธรรมดา ไม่มีวงกลม */
}
.header-title-block{flex:1;}
.header-app-name{
  font-family:'Chonburi';font-size:24px;color:var(--pink);line-height:1.1;
  display:flex;align-items:center;gap:6px;
}
.header-heart{color:var(--pink);font-size:18px;}
.header-app-sub{font-size:13px;color:var(--text2);margin-top:1px;}

/* Date box — พื้นครีม สองคอลัมน์ */
.date-box{
  margin:10px 0 0;
  background:var(--cream);
  border:1.5px solid var(--cream-border);border-radius:14px;
  padding:10px 14px;
  display:flex;align-items:stretch;justify-content:space-between;gap:10px;
}
.date-box-left{display:flex;align-items:center;gap:10px;}
.date-box-icon{font-size:22px;flex-shrink:0;}
.date-main{display:flex;flex-direction:column;gap:1px;}
.date-text{font-family:'Sarabun';font-size:14px;font-weight:700;color:var(--text);line-height:1.3;}
.date-lunar{font-family:'Sarabun';font-size:12px;color:var(--text2);} /* ขึ้น N ค่ำ เดือน N */
/* ขวา: 🌸 วันสำคัญนี้ / ชื่อวัน */
.date-box-right{
  display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:2px;
  flex-shrink:0;
}
.date-box-right-label{font-family:'Sarabun';font-size:11px;color:var(--text2);}
.date-box-right-day{
  font-family:'Sarabun';font-size:13px;font-weight:700;color:var(--pink);
  display:flex;align-items:center;gap:4px;
}

/* Main card display */
.today-main-card{
  flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  padding:10px 16px 6px;
  position:relative;
}
.main-stage{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border-radius:16px;
}

/* card wrapper */
.cw{
  position:absolute;left:50%;top:50%;
  transform-origin:center center;
  transition:transform .44s cubic-bezier(.34,1.1,.64,1),opacity .38s ease,filter .38s ease;
  cursor:grab;user-select:none;touch-action:pan-y;
}
.cw.no-anim{transition:none!important}
.card{
  position:relative;border-radius:20px;overflow:hidden;background:#1a1208;
  transition:box-shadow .44s ease;
}
.card img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:opacity .25s}
.scrim{position:absolute;inset:0;z-index:1}
.content{position:absolute;inset:0;display:flex;flex-direction:column;z-index:3;color:#fff}
.hello{font-family:'Chonburi';line-height:1.15;text-shadow:0 2px 12px rgba(0,0,0,.5);word-break:keep-all;overflow-wrap:break-word}
.bless{font-family:'Charm';font-weight:700;line-height:1.45;text-shadow:0 1px 8px rgba(0,0,0,.55);word-break:keep-all;overflow-wrap:break-word}
.date{font-family:'Sarabun';font-size:12px;opacity:.92;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.sparkle{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px rgba(255,255,255,.8);z-index:2;pointer-events:none}

/* Action buttons — ทั้งคู่สีเขียวตามภาพ */
.today-actions{
  flex-shrink:0;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 16px 8px;
}
.btn{
  border:none;border-radius:16px;padding:0 12px;
  font-family:'Kanit';font-weight:600;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:transform .12s;min-height:56px;
}
.btn:active{transform:scale(.95)}.btn:disabled{opacity:.5}
.btn-main-text{font-size:16px;display:flex;align-items:center;gap:7px;}
.btn-sub-text{font-size:11px;opacity:.82;font-family:'Sarabun';}
/* ซ้าย: เขียวเข้ม บันทึกรูป */
.btn.save{
  background:var(--green);
  color:#fff;box-shadow:0 3px 12px rgba(26,138,58,.3);
}
/* ขวา: เขียว LINE */
.btn.line-share{
  background:var(--line-green);
  color:#fff;box-shadow:0 3px 12px rgba(6,199,85,.3);
}
.btn.copy{background:var(--green);color:#fff;box-shadow:0 3px 12px rgba(26,138,58,.3);}
.line-browser #btnCopy{display:none}
.line-browser .today-actions{grid-template-columns:1fr}

/* Thumbnail strip — ตามภาพ: "🌸 รูปเพิ่มเติมของวันนี้" + thumbnail row */
.thumb-strip{
  flex-shrink:0;
  padding:4px 16px 10px;
}
.thumb-strip-label{
  font-family:'Sarabun';font-size:14px;font-weight:700;color:var(--text);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.thumb-row{
  display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.thumb-row::-webkit-scrollbar{display:none}
/* thumbnail มีข้อความ overlay "สวัสดีวันจันทร์" */
.thumb-item{
  flex-shrink:0;width:78px;height:78px;
  scroll-snap-align:start;
  border-radius:12px;overflow:hidden;position:relative;cursor:pointer;
  border:2.5px solid transparent;transition:border-color .2s,transform .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.thumb-item.active{border-color:var(--pink);}
.thumb-item:active{transform:scale(.95)}
.thumb-item img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.thumb-caption{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(0,0,0,.58) 0%,transparent 100%);
  padding:14px 4px 4px;
  font-family:'Chonburi';font-size:9px;color:#fff;text-align:center;
  line-height:1.2;
}
/* ลูกศรซ้าย-ขวา สำหรับ desktop */
.thumb-nav{display:flex;align-items:center;gap:8px;margin-top:6px;}
.thumb-counter{font-family:'Sarabun';font-size:13px;font-weight:700;color:var(--text2);flex:1;}
.swipe-arrows{display:flex;gap:4px;}
.swipe-arrow{
  font-size:20px;padding:6px 10px;border-radius:12px;
  cursor:pointer;line-height:1;border:none;background:none;
  color:var(--text2);transition:background .15s,color .15s;
}
.swipe-arrow:hover{background:rgba(233,30,140,.1);color:var(--pink);}
.swipe-arrow:active{transform:scale(.9)}

/* LINE notice */
.line-notice{display:none;padding:0 18px 8px;flex-shrink:0;}
.line-notice.show{display:block}
.line-browser .line-notice{display:none!important}
.line-notice-inner{background:#06c755;border-radius:12px;padding:10px 14px;display:flex;align-items:flex-start;gap:8px;}
.line-notice-text{font-family:'Sarabun';font-size:14px;font-weight:600;color:#fff;line-height:1.5;}

/* ─────────────────────────── PAGE: CATEGORIES ─────────────────────────── */
#pageCategory{background:#fff;overflow-y:auto;}

.cat-header{
  flex-shrink:0;
  background:#fff;
  padding:max(14px,env(safe-area-inset-top)) 18px 12px;
  border-bottom:none;
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:10px;
}
.cat-header-icon{font-size:24px;}
.cat-header-text{}
.cat-header-title{font-family:'Chonburi';font-size:20px;color:var(--pink);line-height:1.1;}
.cat-header-sub{font-size:13px;color:var(--text2);margin-top:1px;}

.cat-grid-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.cat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;padding:14px;
}
.cat-card{
  border-radius:18px;overflow:hidden;
  background:var(--white);
  box-shadow:0 2px 12px rgba(180,20,110,.08);
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;
  aspect-ratio:1;position:relative;
}
.cat-card:active{transform:scale(.95)}
.cat-card:hover{box-shadow:0 4px 18px rgba(180,20,110,.18);}
.cat-card-img{
  position:absolute;inset:0;
  object-fit:cover;width:100%;height:100%;display:block;
}
.cat-card-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,transparent 100%);
  padding:8px 8px 10px;
  display:flex;align-items:flex-end;justify-content:center;
}
.cat-card-label{
  font-family:'Sarabun';font-size:13px;font-weight:700;
  color:#fff;text-align:center;line-height:1.2;
  text-shadow:0 1px 5px rgba(0,0,0,.6);
  display:flex;align-items:center;gap:4px;
}
/* สีพื้นหลัง cat card ตายตัวตามภาพ (ถ้ารูปโหลดไม่ขึ้น) */
.cat-card[data-id="flowers"]{background:#fce4f0;}
.cat-card[data-id="dharma"]{background:#fff3d6;}
.cat-card[data-id="inspire"]{background:#ffe8f4;}
.cat-card[data-id="miss"]{background:#fce4f0;}
.cat-card[data-id="birthday"]{background:#f3e5f5;}
.cat-card[data-id="elderly"]{background:#e8f5e9;}
.cat-card[data-id="health"]{background:#e1f5fe;}
.cat-card[data-id="festival"]{background:#1a237e;}
.cat-card[data-id="family"]{background:#e8f5e9;}
.cat-card[data-id="pets"]{background:#fff3e0;}
.cat-card[data-id="coffee"]{background:#efebe9;}
.cat-card[data-id="nature"]{background:#e3f2fd;}

/* ─────────────────────────── PAGE: CATEGORY DETAIL ─────────────────────────── */
#pageCatDetail{background:#fdf5fc;}

.catd-header{
  flex-shrink:0;
  background:var(--white);
  padding:max(14px,env(safe-area-inset-top)) 18px 12px;
  border-bottom:1px solid #f0d6ee;
  display:flex;align-items:center;gap:12px;
}
.catd-back{
  font-size:24px;cursor:pointer;padding:4px 6px;border-radius:10px;
  border:none;background:none;
  transition:background .15s;line-height:1;
}
.catd-back:hover{background:rgba(233,30,140,.1);}
.catd-title-block{}
.catd-title{font-family:'Chonburi';font-size:18px;color:var(--pink);}
.catd-count{font-size:12px;color:var(--text2);}

.catd-grid-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.catd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px;}
.catd-item{
  border-radius:16px;overflow:hidden;
  aspect-ratio:1;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  position:relative;
  box-shadow:0 2px 10px rgba(180,20,110,.08);
}
.catd-item:active{transform:scale(.95)}
.catd-item.selected{box-shadow:0 0 0 3px var(--pink),0 4px 14px rgba(233,30,140,.3);}
.catd-item img{width:100%;height:100%;object-fit:cover;display:block;}
.catd-item-check{
  position:absolute;top:8px;right:8px;
  width:24px;height:24px;border-radius:50%;
  background:var(--pink);color:#fff;
  display:none;align-items:center;justify-content:center;font-size:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.catd-item.selected .catd-item-check{display:flex;}

.catd-actions{
  flex-shrink:0;padding:12px 18px;
  background:var(--white);border-top:1px solid #f0d6ee;
}
.catd-use-btn{
  width:100%;padding:14px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--pink),#ff5fa0);
  color:#fff;font-family:'Kanit';font-size:17px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(233,30,140,.32);
  transition:transform .12s;
}
.catd-use-btn:active{transform:scale(.97)}

/* ── misc ── */
.msg{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.7}
.msg code{background:#fff;padding:2px 6px;border-radius:6px;border:1px solid #f0d0ee;font-size:12px}
.toast{position:fixed;bottom:calc(var(--tab-h) + 16px);left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:11px 20px;border-radius:24px;
  font-family:'Kanit';font-size:14px;z-index:999;opacity:0;transition:.25s;
  pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
/* image viewer overlay สำหรับ LINE */
#imgViewer img{-webkit-touch-callout:default!important;touch-action:auto!important}
/* ปุ่ม i แหล่งที่มา */
.src-btn{position:absolute;right:10px;bottom:10px;z-index:6;width:26px;height:26px;
  border-radius:50%;border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.20);
  -webkit-backdrop-filter:blur(6px) saturate(1.2);backdrop-filter:blur(6px) saturate(1.2);
  color:#fff;font-family:'Charm',serif;font-style:italic;font-weight:700;font-size:15px;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;
  box-shadow:0 2px 8px rgba(0,0,0,.25)}
.src-btn:active{transform:scale(.9)}
</style>
</head>
<body>
<div class="app" id="appEl">

  <!-- ══════════════ PAGE: TODAY ══════════════ -->
  <div class="page active" id="pageToday">

    <!-- Header — ตามภาพ -->
    <div class="today-header">
      <div class="today-header-row">
        <div class="header-sun">☀️</div>
        <div class="header-title-block">
          <div class="header-app-name">สวัสดีทุกวัน <span class="header-heart">♥</span></div>
          <div class="header-app-sub">ภาพสวย ส่งต่อความสุข</div>
        </div>
      </div>
      <!-- Date box: ซ้าย=📅+วันที่+ขึ้นค่ำ, ขวา=🌸+วันสำคัญนี้+ชื่อวัน -->
      <div class="date-box">
        <div class="date-box-left">
          <div class="date-box-icon">📅</div>
          <div class="date-main">
            <div class="date-text" id="dateLine">กำลังโหลด…</div>
            <div class="date-lunar" id="dateLunar"></div>
          </div>
        </div>
        <div class="date-box-right">
          <div class="date-box-right-label">วันสำคัญนี้</div>
          <div class="date-box-right-day" id="dayBadge"><span>🌸</span><span id="dayBadgeText">วันจันทร์</span></div>
        </div>
      </div>
    </div>

    <!-- Main card display (stage) -->
    <div class="today-main-card">
      <div class="main-stage" id="stage"></div>
    </div>

    <!-- Action buttons — เขียวทั้งคู่ตามภาพ -->
    <div class="today-actions" id="actions" style="display:none">
      <button class="btn save" id="btnSave">
        <div class="btn-main-text">⬇️ บันทึกรูป</div>
        <div class="btn-sub-text">เก็บไว้ในเครื่อง</div>
      </button>
      <button class="btn line-share" id="btnLineShare">
        <div class="btn-main-text"><span style="font-size:20px">💬</span> ส่งเข้า LINE</div>
        <div class="btn-sub-text">ส่งต่อให้เพื่อน</div>
      </button>
    </div>

    <!-- LINE Notice -->
    <div class="line-notice" id="lineNoticeEl">
      <div class="line-notice-inner">
        <div style="font-size:16px;flex-shrink:0;margin-top:1px">💬</div>
        <div class="line-notice-text">
          ใน LINE กรุณาใช้ปุ่ม <strong>⬇️ บันทึกรูป</strong> แล้วกดค้างที่รูปเพื่อบันทึก
        </div>
      </div>
    </div>

    <!-- Thumbnail strip — ตามภาพ -->
    <div class="thumb-strip" id="thumbStrip" style="display:none">
      <div class="thumb-strip-label">🌸 รูปเพิ่มเติมของวันนี้</div>
      <div class="thumb-row" id="thumbRow"></div>
      <!-- nav ซ่อนบนมือถือ แสดงบน desktop -->
      <div class="thumb-nav" id="thumbNav" style="display:none">
        <div class="thumb-counter" id="thumbCounter">รูป 1 จาก …</div>
        <div class="swipe-arrows">
          <button class="swipe-arrow" id="arrowLeft">⬅️</button>
          <button class="swipe-arrow" id="arrowRight">➡️</button>
        </div>
      </div>
    </div>

  </div><!-- /pageToday -->

  <!-- ══════════════ PAGE: CATEGORIES ══════════════ -->
  <div class="page hidden" id="pageCategory">
    <div class="cat-header">
      <div class="cat-header-icon">🌸</div>
      <div class="cat-header-text">
        <div class="cat-header-title">หมวดหมู่ภาพ</div>
        <div class="cat-header-sub">เลือกภาพที่คุณต้องการ</div>
      </div>
    </div>
    <div class="cat-grid-scroll">
      <div class="cat-grid" id="catGrid">
        <!-- สร้างจาก JS -->
      </div>
    </div>
  </div><!-- /pageCategory -->

  <!-- ══════════════ PAGE: CATEGORY DETAIL ══════════════ -->
  <div class="page hidden" id="pageCatDetail">
    <div class="catd-header">
      <button class="catd-back" id="catdBack">←</button>
      <div class="catd-title-block">
        <div class="catd-title" id="catdTitle">ดอกไม้</div>
        <div class="catd-count" id="catdCount">กำลังโหลด…</div>
      </div>
    </div>
    <div class="catd-grid-scroll">
      <div class="catd-grid" id="catdGrid">
        <!-- สร้างจาก JS -->
      </div>
    </div>
    <div class="catd-actions">
      <button class="catd-use-btn" id="catdUseBtn">✨ ใช้รูปนี้</button>

function hexA(hex,a){try{const n=parseInt(hex.replace('#',''),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}catch{return`rgba(0,0,0,${a})`;}}

function scrimCSS(p,color,c2){
  color=color||'#b8893b';c2=c2||'#6b4c1e';
  const tint=`radial-gradient(120% 90% at 50% 42%,${hexA(color,.04)} 0%,${hexA(c2,.28)} 100%)`;
  const m={
    bottom:`linear-gradient(180deg,rgba(0,0,0,.10) 0%,rgba(0,0,0,0) 38%,rgba(0,0,0,.22) 62%,rgba(0,0,0,.68) 100%)`,
    top:   `linear-gradient(0deg,rgba(0,0,0,.06) 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,.20) 62%,rgba(0,0,0,.64) 100%)`,
    left:  `linear-gradient(90deg,rgba(0,0,0,.66) 0%,rgba(0,0,0,.18) 48%,rgba(0,0,0,0) 72%)`,
    right: `linear-gradient(270deg,rgba(0,0,0,.66) 0%,rgba(0,0,0,.18) 48%,rgba(0,0,0,0) 72%)`,
    center:`radial-gradient(closest-side,rgba(0,0,0,.52) 0%,rgba(0,0,0,.16) 62%,rgba(0,0,0,0) 100%)`,
  };
  return`${m[p]||m.bottom}, ${tint}`;
}

function pickPool(arr,used,max){
  if(used.length>=arr.length)used.length=0;
  let idx,t=0;
  do{idx=Math.floor(Math.random()*arr.length);t++;}while(used.includes(idx)&&t<20);
  used.push(idx);if(used.length>max)used.shift();
  return{item:arr[idx],idx};
}

function pickBless(){
  const FALLBACK=['ขอให้มีความสุขตลอดวัน','สุขภาพแข็งแรง คิดสิ่งใดสมหวัง','ขอให้โชคดีมีแต่สิ่งดีๆ','วันนี้ขอให้สดใส เบาสบายใจ','ขอให้ทุกก้าวพบเจอสิ่งมงคล','รอยยิ้มสดใส รับวันใหม่'];
  const pool=(M?.blessings?.length>=2)?M.blessings:(M?.blessings||[]).concat(FALLBACK);
  const{item,idx}=pickPool(pool,uBl,Math.max(3,Math.floor(pool.length/2)));
  lastBlIdx=idx;return item;
}

function mkCombo(){
  if(Array.isArray(M.cards)&&M.cards.length){
    if(cardOrder.length!==M.cards.length){
      cardOrder=M.cards.map((_,i)=>i);
      for(let i=cardOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cardOrder[i],cardOrder[j]]=[cardOrder[j],cardOrder[i]];}
      cardPtr=0;
    }
    const c=M.cards[cardOrder[cardPtr%cardOrder.length]];
    cardPtr++;
    const fr=FRAMES[c.fr]||FRAMES[0];
    const lay=LAYOUTS[c.lay]||LAYOUTS[0];
    const tx=TEXT_SIZES[c.tx]||TEXT_SIZES[0];
    const ov=OVERLAYS[c.ov]||OVERLAYS[0];
    const imgIdx=M.images?M.images.indexOf(c.img):-1;
    return{imgSrc:`${BASE}/${c.img}?v=${M.version}`,imgIdx,fr,lay,bl:c.bl,tx,ov,vp:c.vp};
  }
  const imgRes=pickPool(M.images,uImg,Math.max(4,Math.floor(M.images.length/2)));
  const frRes =pickPool(FRAMES,uFr,6);
  const layRes=pickPool(LAYOUTS,uLay,4);
  const txRes =pickPool(TEXT_SIZES,uTx,3);
  const ovRes =pickPool(OVERLAYS,uOv,3);
  return{imgSrc:`${BASE}/${imgRes.item}?v=${M.version}`,imgIdx:imgRes.idx,fr:frRes.item,lay:layRes.item,bl:pickBless(),tx:txRes.item,ov:ovRes.item,vp:(M.imgPos&&M.imgPos[imgRes.idx])||null};
}

function buildCard(cb,CW){
  const{imgSrc,fr,lay,bl,tx,ov}=cb;
  const _vp=(cb.vp==='top'||cb.vp==='bottom')?cb.vp:null;
  const cw=document.createElement('div');cw.className='cw';
  cw.style.width=CW+'px';cw.style.height=CW+'px';
  cw.style.marginLeft=(-CW/2)+'px';cw.style.marginTop=(-CW/2)+'px';
  const card=document.createElement('div');card.className='card';
  card.style.width=CW+'px';card.style.height=CW+'px';
  const bg=document.createElement('img');bg.className='bg';bg.crossOrigin='anonymous';
  bg.style.opacity='0';bg.onload=()=>bg.style.opacity='1';bg.src=imgSrc;
  if(ov&&ov.cssFilter)bg.style.filter=ov.cssFilter;
  card.appendChild(bg);
  const sc=document.createElement('div');sc.className='scrim';
  sc.style.background=scrimCSS(_vp||lay.scrim,M.color,M.color2);
  card.appendChild(sc);
  applyFrameToCard(card,fr);
  const L=lay;
  const TEXT_SCALE=1.8;
  const hs=Math.round((tx?tx.hs_mul:1)*L.hs*TEXT_SCALE);
  const bsz=Math.round((tx?tx.bs_mul:1)*L.bs*TEXT_SCALE);
  const gap=tx?tx.gap:8;
  const content=document.createElement('div');content.className='content';
  const _fi=parseFloat(fr.fi)||18;
  const _pp=String(L.pad||'22px').trim().split(/\s+/).map(v=>parseFloat(v)||0);
  let _pt,_pr,_pb,_pl;
  if(_pp.length<=1){_pt=_pr=_pb=_pl=_pp[0]||0;}
  else if(_pp.length===2){_pt=_pb=_pp[0];_pr=_pl=_pp[1];}
  else if(_pp.length===3){_pt=_pp[0];_pr=_pl=_pp[1];_pb=_pp[2];}
  else{_pt=_pp[0];_pr=_pp[1];_pb=_pp[2];_pl=_pp[3];}
  _pt=Math.max(_pt,_fi);_pr=Math.max(_pr,_fi);_pb=Math.max(_pb,_fi);_pl=Math.max(_pl,_fi);
  const vpos=_vp?_vp:(L.j==='flex-start'?'top':(L.j==='flex-end'?'bottom':'center'));
  const hpos=L.ta==='left'?'left':(L.ta==='right'?'right':'center');
  const _hAlign=hpos==='left'?'align-items:flex-start;text-align:left'
                :hpos==='right'?'align-items:flex-end;text-align:right'
                :'align-items:center;text-align:center';
  const tb=document.createElement('div');
  if(vpos==='center'){
    content.style.cssText=`position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:${_pt}px ${_pr}px ${_pb}px ${_pl}px;${_hAlign}`;
    tb.style.cssText=`display:flex;flex-direction:column;gap:${gap}px;max-width:100%;${_hAlign}`;
  }else{
    content.style.cssText=`position:absolute;inset:0`;
    const _v=vpos==='top'?`top:${_pt}px;`:`bottom:${_pb}px;`;
    tb.style.cssText=`position:absolute;left:${_pl}px;right:${_pr}px;${_v}display:flex;flex-direction:column;gap:${gap}px;${_hAlign}`;
  }
  if(L.panel)tb.style.cssText+=`;background:rgba(0,0,0,.34);padding:14px 18px;border-radius:16px;border:1px solid rgba(255,255,255,.22)`;
  const _esc=(s)=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const _wrap=(parts)=>parts.filter(x=>x!==''&&x!=null).map(p=>`<span style="white-space:nowrap">${_esc(p)}</span>`).join('\u200B');
  const _segHTML=(text)=>String(text).split(/(\s+)/).map(tok=>{
    if(tok===''||/^\s+$/.test(tok))return tok;
    let words=[tok];
    try{if(typeof Intl!=='undefined'&&Intl.Segmenter){
      words=Array.from(new Intl.Segmenter('th',{granularity:'word'}).segment(tok),s=>s.segment).filter(w=>w!=='');
    }}catch(e){}
    const merged=[];
    for(let i=0;i<words.length;i++){
      if(words[i]==='วัน'&&i+1<words.length){merged.push('วัน'+words[i+1]);i++;}
      else merged.push(words[i]);
    }
    return _wrap(merged);
  }).join('');
  const h=document.createElement('div');h.className='hello';
  h.style.cssText=`font-family:'${L.font}',sans-serif;font-size:${hs}px`;
  const _hl=M.headline||('สวัสดีวัน'+M.dayTh);
  h.innerHTML=(M.dayTh&&_hl===('สวัสดีวัน'+M.dayTh))?_wrap(['สวัสดี','วัน'+M.dayTh]):_segHTML(_hl);
  const blEl=document.createElement('div');blEl.className='bless';blEl.style.fontSize=bsz+'px';
  blEl.innerHTML=_segHTML(bl);
  if(tx&&tx.outline){
    const oc=M.color||'#c0392b';
    const _ring=(c,w)=>`${-w}px ${-w}px 0 ${c},${w}px ${-w}px 0 ${c},${-w}px ${w}px 0 ${c},${w}px ${w}px 0 ${c}`;
    h.style.textShadow=_ring(oc,Math.max(2,Math.round(hs/20)))+`,0 2px 10px rgba(0,0,0,.45)`;
    blEl.style.textShadow=_ring(oc,Math.max(1,Math.round(bsz/24)))+`,0 1px 6px rgba(0,0,0,.5)`;
  }
  const dt=document.createElement('div');dt.className='date';dt.textContent=M.dateThai;dt.style.fontSize=Math.round(bsz*0.62)+'px';
  tb.append(h,blEl,dt);content.appendChild(tb);card.appendChild(content);
  for(let i=0;i<7;i++){
    const s=document.createElement('div');s.className='sparkle';
    s.style.cssText=`left:${8+Math.random()*84}%;top:${8+Math.random()*84}%;opacity:${.4+Math.random()*.6};transform:scale(${.6+Math.random()})`;
    card.appendChild(s);
  }
  cw.appendChild(card);
  return cw;
}

const fNum=(v,d)=>{const n=parseFloat(v);return isNaN(n)?(d||0):n;};

function buildCorners(card,spec){
  const t=spec.t,ins=fNum(spec.inset,8),size=fNum(spec.size,30),w=fNum(spec.w,3),
        gap=fNum(spec.gap,5),r=fNum(spec.r,5),color=spec.color||'#ffd700',color2=spec.color2||color;
  const fc=(css)=>{const d=document.createElement('div');d.className='fcorner';
    d.style.cssText='position:absolute;pointer-events:none;z-index:6;'+css;card.appendChild(d);};
  const corners=[['top','left'],['top','right'],['bottom','left'],['bottom','right']];
  corners.forEach(([vy,hx])=>{
    if(t==='bracket'||t==='steps'){
      const offs=(t==='steps')?[0,gap+w]:[0];
      offs.forEach((off,i)=>{
        const sz=size-i*(gap+w);if(sz<=w)return;
        const col=i?color2:color;
        fc(`${vy}:${ins+off}px;${hx}:${ins+off}px;width:${sz}px;height:${w}px;background:${col}`);
        fc(`${vy}:${ins+off}px;${hx}:${ins+off}px;width:${w}px;height:${sz}px;background:${col}`);
      });
    }else if(t==='dots'||t==='petals'){
      const cnt=(t==='petals')?4:3;
      for(let i=0;i<cnt;i++){
        const off=ins+i*(r*2+3);
        const col=(t==='petals'&&(i%2))?color2:color;
        fc(`${vy}:${off}px;${hx}:${ins}px;width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col}`);
        if(t==='petals'&&i>0)fc(`${vy}:${ins}px;${hx}:${off}px;width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col}`);
      }
    }
  });
}

function applyFrameToCard(card,fr){
  card.querySelectorAll('.frame-layer,.fcorner,.frame-border,.frame-inner,.corner').forEach(e=>e.remove());
  const _DAY=(M&&M.color)?M.color:'#1F73C4';
  const _DAY2=(M&&M.color2)?M.color2:'#0f4677';
  const _dc=(v)=>v==='DAY'?_DAY:v==='DAY2'?_DAY2:v;
  if(fr){fr={...fr,
    layers:(fr.layers||[]).map(L=>({...L,color:_dc(L.color),color2:_dc(L.color2),light:_dc(L.light),dark:_dc(L.dark),bg:_dc(L.bg)})),
    corners:fr.corners?{...fr.corners,color:_dc(fr.corners.color),color2:_dc(fr.corners.color2)}:fr.corners
  };}
  const cw=card.parentElement;
  if(cw&&cw.classList.contains('cw'))cw.dataset.outerShadow='';
  card.style.boxShadow='none';
  if(!fr)return;
  const add=(css)=>{const d=document.createElement('div');d.className='frame-layer';
    d.style.cssText='position:absolute;pointer-events:none;z-index:4;'+css;card.appendChild(d);};
  const _cardW=card.offsetWidth||parseFloat(card.style.width)||800;
  const FW=Math.min(4.2,Math.max(1.35,(800/_cardW)*1.35));
  const wScale=(w)=>Math.round(fNum(w,1)*FW*10)/10;
  const sides=(ins)=>`top:${ins}px;right:${ins}px;bottom:${ins}px;left:${ins}px`;
  (fr.layers||[]).forEach(L=>{
    const ins=fNum(L.inset);
    if(L.line){
      add(`${sides(ins)};border:${wScale(L.w)}px ${L.style||'solid'} ${L.color};border-radius:${fNum(L.radius)}px`);
    }else if(L.bevel){
      const lt=(L.bevel==='out')?L.light:L.dark;
      const dk=(L.bevel==='out')?L.dark:L.light;
      add(`${sides(ins)};border-style:solid;border-width:${wScale(L.w)}px;border-top-color:${lt};border-left-color:${lt};border-right-color:${dk};border-bottom-color:${dk};border-radius:${fNum(L.radius)}px`);
    }else if(L.shadow){
      const d=fNum(L.depth,24),c=L.color||'rgba(0,0,0,.5)';
      add(`left:${ins}px;right:${ins}px;top:${ins}px;height:${d}px;background:linear-gradient(180deg,${c},rgba(0,0,0,0))`);
      add(`left:${ins}px;right:${ins}px;bottom:${ins}px;height:${d}px;background:linear-gradient(0deg,${c},rgba(0,0,0,0))`);
      add(`top:${ins}px;bottom:${ins}px;left:${ins}px;width:${d}px;background:linear-gradient(90deg,${c},rgba(0,0,0,0))`);
      add(`top:${ins}px;bottom:${ins}px;right:${ins}px;width:${d}px;background:linear-gradient(270deg,${c},rgba(0,0,0,0))`);
    }else if(L.band){
      const t=wScale(L.w||12),bg=L.bg||'#ffffff';
      add(`left:${ins}px;right:${ins}px;top:${ins}px;height:${t}px;background:${bg}`);
      add(`left:${ins}px;right:${ins}px;bottom:${ins}px;height:${t}px;background:${bg}`);
      add(`top:${ins}px;bottom:${ins}px;left:${ins}px;width:${t}px;background:${bg}`);
      add(`top:${ins}px;bottom:${ins}px;right:${ins}px;width:${t}px;background:${bg}`);
    }
  });
  if(fr.corners)buildCorners(card,fr.corners);
}

/* ── SIZING ─────────────────────────────────────────────────────────── */
const stage=document.getElementById('stage');
let CW=0,SIDE_SCALE=0.78,SIDE_OFFSET=0,SIDE_Y=0;

function computeSizes(){
  const sw=stage.offsetWidth;
  const sh=stage.offsetHeight;
  const availH=Math.max(sh,200);
  CW=Math.min(Math.round(sw*0.92),Math.round(availH*0.95));
  CW=Math.max(CW,180);
  SIDE_SCALE=0.78;
  SIDE_OFFSET=Math.round(sw*0.58);
  SIDE_Y=Math.round(CW*0.04);
}
function relayout(){
  computeSizes();
  cwEls.forEach(cw=>{
    cw.style.width=CW+'px';cw.style.height=CW+'px';
    cw.style.marginLeft=(-CW/2)+'px';cw.style.marginTop=(-CW/2)+'px';
    const card=cw.querySelector('.card');
    if(card){card.style.width=CW+'px';card.style.height=CW+'px';}
  });
  layoutAll(false);
}

/* ── CAROUSEL STATE ─────────────────────────────────────────────────── */
const POOL=7;
let combos=[],cwEls=[],globalIdx=0;
function curSlot(){return((globalIdx%POOL)+POOL)%POOL;}
function circDist(i,c){let d=i-c;if(d>POOL/2)d-=POOL;if(d<-POOL/2)d+=POOL;return d;}

function posFor(i){
  const d=circDist(i,curSlot());
  if(d===0)return{tx:0,ty:0,sc:1,op:1,br:1,z:10,sh:'0 28px 60px rgba(50,28,5,.42),0 8px 20px rgba(50,28,5,.24)'};
  if(d===1)return{tx:SIDE_OFFSET,ty:SIDE_Y,sc:SIDE_SCALE,op:.78,br:.82,z:5,sh:'0 8px 20px rgba(50,28,5,.14)'};
  if(d===-1)return{tx:-SIDE_OFFSET,ty:SIDE_Y,sc:SIDE_SCALE,op:.78,br:.82,z:5,sh:'0 8px 20px rgba(50,28,5,.14)'};
  const fx=SIDE_OFFSET+Math.abs(d)*CW*.08;
  return{tx:d>0?fx:-fx,ty:SIDE_Y+12,sc:SIDE_SCALE*.84,op:.22,br:.55,z:0,sh:'none'};
}
function applyPos(cw,p,anim){
  const card=cw.querySelector('.card');
  if(!anim)cw.classList.add('no-anim');else cw.classList.remove('no-anim');
  if(!anim)cw.offsetHeight;
  cw.style.transform=`translate(${p.tx}px,${p.ty}px) scale(${p.sc})`;
  cw.style.opacity=p.op;cw.style.zIndex=p.z;
  cw.style.filter=p.br>=1?'none':`brightness(${p.br})`;
  if(card){const outerFrame=cw.dataset.outerShadow||'';const combined=[p.sh,outerFrame].filter(Boolean).join(', ');card.style.boxShadow=combined||'none';}
  if(!anim)requestAnimationFrame(()=>cw.classList.remove('no-anim'));
}
function layoutAll(anim=true){cwEls.forEach((cw,i)=>applyPos(cw,posFor(i),anim));updateThumbCounter();}

function refreshSlot(slot){
  const g=globalIdx+circDist(slot,curSlot());
  combos[slot]=cardFor(g);
  const cw=cwEls[slot];
  const old=cw.querySelector('.card');
  const fresh=buildFinishedCard(g,CW).querySelector('.card');
  cw.replaceChild(fresh,old);
  cw.style.width=CW+'px';cw.style.height=CW+'px';
  cw.style.marginLeft=(-CW/2)+'px';cw.style.marginTop=(-CW/2)+'px';
  fresh.style.width=CW+'px';fresh.style.height=CW+'px';
}

/* ── SWIPE ──────────────────────────────────────────────────────────── */
function attachSwipe(){
  let sx=0,sy=0,dx=0,dragging=false,horiz=null,dragMoved=false;
  const THRESH=50;
  const lerp=(a,b,t)=>a+(b-a)*t;
  function go(dir){
    if(!cwEls.length)return;
    if(dir>0){globalIdx++;refreshSlot(((globalIdx+2)%POOL+POOL)%POOL);}
    else{globalIdx--;refreshSlot(((globalIdx-2)%POOL+POOL)%POOL);}
    track2('next');layoutAll(true);updateThumbHighlight();
  }
  function liveLayout(rawDx){
    const frac=Math.min(Math.abs(rawDx)/(CW*.55),1);
    const dir=rawDx<0?1:-1;
    cwEls.forEach((cw,i)=>{
      const fromP=posFor(i);
      const nc=(((curSlot()+dir)%POOL)+POOL)%POOL;
      const d2=circDist(i,nc);
      const fx2=SIDE_OFFSET+Math.abs(d2)*CW*.08;
      const toP={tx:d2===0?0:d2===1?SIDE_OFFSET:d2===-1?-SIDE_OFFSET:d2>0?fx2:-fx2,ty:d2===0?0:Math.abs(d2)===1?SIDE_Y:SIDE_Y+12,sc:d2===0?1:Math.abs(d2)===1?SIDE_SCALE:SIDE_SCALE*.84,op:d2===0?1:Math.abs(d2)===1?.78:.22,br:d2===0?1:Math.abs(d2)===1?.82:.55,sh:d2===0?'0 28px 60px rgba(50,28,5,.42)':Math.abs(d2)===1?'0 8px 20px rgba(50,28,5,.14)':'none'};
      const card=cw.querySelector('.card');
      const liveX=lerp(fromP.tx,toP.tx,frac)+(i===curSlot()?rawDx:0);
      cw.style.transform=`translate(${liveX}px,${lerp(fromP.ty,toP.ty,frac)}px) scale(${lerp(fromP.sc,toP.sc,frac)})`;
      cw.style.opacity=lerp(fromP.op,toP.op,frac)+'';
      cw.style.filter=`brightness(${lerp(fromP.br,toP.br,frac)})`;
      if(card)card.style.boxShadow=frac>.5?toP.sh:fromP.sh;
    });
  }
  function onStart(x,y){sx=x;sy=y;dx=0;dragging=true;horiz=null;dragMoved=false;cwEls.forEach(cw=>cw.classList.add('no-anim'));}
  function onMove(x,y){if(!dragging)return;dx=x-sx;const dy=y-sy;if(horiz===null&&(Math.abs(dx)>6||Math.abs(dy)>6))horiz=Math.abs(dx)>=Math.abs(dy);if(Math.abs(dx)>6||Math.abs(dy)>6)dragMoved=true;if(!horiz)return;liveLayout(dx);}
  function onEnd(){if(!dragging)return;dragging=false;cwEls.forEach(cw=>cw.classList.remove('no-anim'));if(horiz&&Math.abs(dx)>=THRESH){if(dx<0){globalIdx++;refreshSlot(((globalIdx+2)%POOL+POOL)%POOL);}else{globalIdx--;refreshSlot(((globalIdx-2)%POOL+POOL)%POOL);}track2('next');}layoutAll(true);updateThumbHighlight();}
  stage.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',()=>{if(dragging)onEnd();});
  stage.addEventListener('touchstart',e=>onStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  stage.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX,e.touches[0].clientY);if(horiz)e.preventDefault();},{passive:false});
  stage.addEventListener('touchend',()=>onEnd());
  window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}else if(e.key==='ArrowRight'){e.preventDefault();go(1);}});
  document.getElementById('arrowLeft').addEventListener('click',()=>go(-1));
  document.getElementById('arrowRight').addEventListener('click',()=>go(1));
  cwEls.forEach((cw,slot)=>{cw.style.cursor='pointer';cw.addEventListener('click',()=>{if(dragMoved)return;const d=circDist(slot,curSlot());if(d===1)go(1);else if(d===-1)go(-1);});});
}

/* ── SNAPSHOT ───────────────────────────────────────────────────────── */
async function snapshot(){
  const slot=curSlot();
  const liveCard=cwEls[slot].querySelector('.card');
  const liveImg=liveCard.querySelector('img.bg');
  const S=2;
  const cloneCard=liveCard.cloneNode(true);
  const sb=cloneCard.querySelector('.src-btn');if(sb)sb.remove();
  cloneCard.style.transform='none';cloneCard.style.boxShadow='none';
  cloneCard.style.position='absolute';cloneCard.style.left='0';cloneCard.style.top='0';
  cloneCard.style.width=CW+'px';cloneCard.style.height=CW+'px';
  const wrap=document.createElement('div');
  wrap.style.cssText=`position:fixed;left:-${CW+300}px;top:0;width:${CW}px;height:${CW}px;overflow:hidden;z-index:-9999;opacity:0;pointer-events:none;background:#1a1208`;
  wrap.appendChild(cloneCard);document.body.appendChild(wrap);
  const cloneImg=cloneCard.querySelector('img.bg');
  if(liveImg&&cloneImg){cloneImg.crossOrigin='anonymous';cloneImg.style.opacity='1';
    if(cloneImg.src!==liveImg.src)cloneImg.src=liveImg.src;
    if(!cloneImg.complete||cloneImg.naturalWidth===0){await new Promise(res=>{cloneImg.onload=res;cloneImg.onerror=res;setTimeout(res,8000);});}}
  if(document.fonts&&document.fonts.ready){try{await Promise.race([document.fonts.ready,new Promise(r=>setTimeout(r,3000))]);}catch(e){}}
  let canvas;
  try{canvas=await html2canvas(cloneCard,{useCORS:true,allowTaint:false,scale:S,backgroundColor:'#1a1208',logging:false,width:CW,height:CW,x:0,y:0,scrollX:0,scrollY:0});}
  finally{document.body.removeChild(wrap);}
  return canvas;
}

/* ── PRE-BAKED CARDS ─────────────────────────────────────────────────── */
let CARDS=[], imgBase='';
function cardIndexFor(g){const n=CARDS.length||1;return((g%n)+n)%n;}
function cardFor(g){return CARDS[cardIndexFor(g)]||CARDS[0]||{file:'',src:null};}
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function buildFinishedCard(g,CW){
  const c=cardFor(g);
  const cw=document.createElement('div');cw.className='cw';
  cw.style.width=CW+'px';cw.style.height=CW+'px';
  cw.style.marginLeft=(-CW/2)+'px';cw.style.marginTop=(-CW/2)+'px';
  const card=document.createElement('div');card.className='card';
  card.style.width=CW+'px';card.style.height=CW+'px';
  const img=document.createElement('img');img.className='bg';img.crossOrigin='anonymous';img.alt='';
  img.src=`${imgBase}/${c.file}?v=${M&&M.version?M.version:''}`;
  card.appendChild(img);
  if(c.src&&(c.src.name||c.src.by||c.src.link)){
    const ib=document.createElement('button');ib.className='src-btn';ib.type='button';ib.textContent='i';
    ib.setAttribute('aria-label','แหล่งที่มาของภาพ');
    const stop=ev=>ev.stopPropagation();ib.addEventListener('mousedown',stop);ib.addEventListener('touchstart',stop,{passive:true});
    ib.addEventListener('click',ev=>{ev.stopPropagation();showSource(c.src);});card.appendChild(ib);
  }
  cw.appendChild(card);return cw;
}

function showSource(src){
  const ex=document.getElementById('srcPop');if(ex)ex.remove();
  const ov=document.createElement('div');ov.id='srcPop';
  ov.style.cssText='position:fixed;inset:0;z-index:9998;background:rgba(10,30,45,.55);display:flex;align-items:center;justify-content:center;padding:28px';
  const box=document.createElement('div');
  box.style.cssText="max-width:340px;width:100%;background:rgba(255,255,255,.94);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(233,30,140,.2);border-radius:18px;padding:18px;font-family:'Sarabun';color:#2d1a2e;box-shadow:0 12px 40px rgba(10,40,70,.3)";
  const name=src.name?`<div style="font-size:16px;font-weight:700;margin-bottom:6px">${esc(src.name)}</div>`:'';
  const by=src.by?`<div style="font-size:14px;color:#7a5a7a;margin-bottom:4px">ภาพโดย ${esc(src.by)}</div>`:'';
  const link=src.link?`<a href="${esc(src.link)}" target="_blank" rel="noopener" style="font-size:13px;color:#e91e8c;word-break:break-all">${esc(src.link)}</a>`:'';
  box.innerHTML=`<div style="font-size:12px;letter-spacing:.05em;color:#9a7a9a;margin-bottom:8px">แหล่งที่มาของภาพ</div>${name}${by}${link}<div style="margin-top:14px;text-align:right"><button id="srcClose" style="font-family:'Kanit';font-size:14px;font-weight:600;background:#e91e8c;color:#fff;border:none;padding:9px 22px;border-radius:11px;cursor:pointer">ปิด</button></div>`;
  ov.appendChild(box);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);const cl=document.getElementById('srcClose');if(cl)cl.onclick=()=>ov.remove();
}

/* ── THUMBNAIL STRIP ─────────────────────────────────────────────────── */
function buildThumbStrip(){
  const row=document.getElementById('thumbRow');row.innerHTML='';
  const headline=M&&(M.headline||('สวัสดีวัน'+(M.dayTh||'')));
  CARDS.forEach((c,i)=>{
    const item=document.createElement('div');item.className='thumb-item'+(i===0?' active':'');
    // รูป
    const img=document.createElement('img');
    img.src=`${imgBase}/${c.file}?v=${M&&M.version?M.version:''}`;img.alt='';
    item.appendChild(img);
    // caption overlay "สวัสดีวันจันทร์" ตามภาพ
    const cap=document.createElement('div');cap.className='thumb-caption';
    cap.textContent=headline||'สวัสดีวันนี้';
    item.appendChild(cap);
    item.addEventListener('click',()=>goToCard(i));
    row.appendChild(item);
  });
  document.getElementById('thumbStrip').style.display='';
  // แสดง nav บน desktop (จอกว้าง)
  const nav=document.getElementById('thumbNav');
  if(nav){nav.style.display=window.innerWidth>480?'flex':'';}
  updateThumbCounter();
}

function goToCard(idx){
  const cur=cardIndexFor(globalIdx);
  const diff=idx-cur;
  globalIdx+=diff;
  // rebuild carousel pool around new globalIdx
  for(let slot=0;slot<POOL;slot++){
    const g=globalIdx+circDist(slot,curSlot());
    combos[slot]=cardFor(g);
    const cw=cwEls[slot];const old=cw.querySelector('.card');
    const fresh=buildFinishedCard(g,CW).querySelector('.card');
    cw.replaceChild(fresh,old);cw.style.width=CW+'px';cw.style.height=CW+'px';
    cw.style.marginLeft=(-CW/2)+'px';cw.style.marginTop=(-CW/2)+'px';fresh.style.width=CW+'px';fresh.style.height=CW+'px';
  }
  layoutAll(true);updateThumbHighlight();
}

function updateThumbHighlight(){
  const idx=cardIndexFor(globalIdx);
  document.querySelectorAll('.thumb-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  // scroll thumb into view
  const row=document.getElementById('thumbRow');
  const items=row.querySelectorAll('.thumb-item');
  if(items[idx]){items[idx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
  updateThumbCounter();
}

function updateThumbCounter(){
  const idx=cardIndexFor(globalIdx);
  const el=document.getElementById('thumbCounter');
  if(el)el.textContent=`รูป ${idx+1} จาก ${CARDS.length}`;
}

/* ── CATEGORIES ─────────────────────────────────────────────────────── */
let catManifests={};
let currentCatId=null;
let selectedCatCardIdx=0;
let selectedCatCard=null;        // {file, blessing, src} ของรูปที่เลือกใน category detail
let _manifestCache=null;         // cache manifest เพื่อไม่ fetch ซ้ำ
let _manifestFolder='';

async function getManifest(){
  if(_manifestCache)return{m:_manifestCache,folder:_manifestFolder};
  const ict=new Date(Date.now()+7*3600*1000);
  const todayISO=`${ict.getUTCFullYear()}-${String(ict.getUTCMonth()+1).padStart(2,'0')}-${String(ict.getUTCDate()).padStart(2,'0')}`;
  let r=await fetch(`${BASE}/img/${todayISO}/manifest.json?v=${Date.now()}`,{cache:'no-store'}).catch(()=>null);
  if(r&&r.ok){_manifestCache=await r.json();_manifestFolder=todayISO;return{m:_manifestCache,folder:todayISO};}
  r=await fetch(`${BASE}/img/evergreen/manifest.json?v=${Date.now()}`,{cache:'no-store'}).catch(()=>null);
  if(r&&r.ok){_manifestCache=await r.json();_manifestFolder='evergreen';return{m:_manifestCache,folder:'evergreen'};}
  return null;
}

function buildCatGrid(){
  const grid=document.getElementById('catGrid');grid.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const card=document.createElement('div');card.className='cat-card';
    card.dataset.id=cat.id;card.setAttribute("data-id",cat.id);
    card.style.background=cat.bg;
    // placeholder color div ก่อน load manifest
    const placeholder=document.createElement('div');
    placeholder.style.cssText=`position:absolute;inset:0;background:${cat.bg};display:flex;align-items:center;justify-content:center;font-size:38px;`;
    placeholder.textContent=cat.icon;
    card.appendChild(placeholder);
    const overlay=document.createElement('div');overlay.className='cat-card-overlay';
    overlay.style.cssText='position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.55) 0%,transparent 80%);padding:8px 8px 10px;display:flex;align-items:flex-end;justify-content:center;';
    const label=document.createElement('div');label.className='cat-card-label';
    label.innerHTML=`<span>${cat.icon}</span><span>${cat.label}</span>`;
    overlay.appendChild(label);card.appendChild(overlay);
    card.addEventListener('click',()=>openCategory(cat));
    grid.appendChild(card);
    // โหลด thumbnail รูปแรกของหมวดนั้น (ถ้ามี)
    loadCatThumbnail(cat,card,placeholder);
  });
}

async function loadCatThumbnail(cat,card,placeholder){
  try{
    const res=await getManifest();if(!res)return;
    const{m,folder}=res;
    const allImgs=(m.images||[]).map(x=>typeof x==='string'?{file:x,category:null}:{file:x.file,category:x.category||null});
    const fromCat=(m.categories&&m.categories[cat.id])||[];
    const fromImgCat=allImgs.filter(x=>x.category===cat.id);
    const catImages=fromCat.length>0?fromCat:fromImgCat;
    const count=catImages.length;
    const badge=document.createElement('div');
    badge.style.cssText='position:absolute;top:7px;right:7px;background:rgba(0,0,0,.52);color:#fff;font-family:Sarabun;font-size:11px;font-weight:700;padding:3px 7px;border-radius:10px;z-index:5;pointer-events:none;';
    badge.textContent=count>0?count+' รูป':'ยังไม่มี';
    card.appendChild(badge);
    if(!count)return;
    const img=document.createElement('img');img.className='cat-card-img';img.crossOrigin='anonymous';img.alt=cat.label;
    img.src=`${BASE}/img/${folder}/${catImages[0].file}?v=${m.version||''}`;
    img.onload=()=>{card.insertBefore(img,placeholder);card.removeChild(placeholder);};
    img.onerror=()=>{};
  }catch(e){}
}

async function openCategory(cat){
  currentCatId=cat.id;selectedCatCardIdx=0;selectedCatCard=null;
  document.getElementById('catdTitle').textContent=`${cat.icon} ${cat.label}`;
  document.getElementById('catdCount').textContent='กำลังโหลด…';
  document.getElementById('catdGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:#9a7a9a;font-size:14px">กำลังโหลด…</div>';
  document.getElementById('catdUseBtn').textContent='✨ ใช้รูปนี้';
  document.getElementById('catdUseBtn').disabled=true;
  document.getElementById('catdUseBtn').style.opacity='0.5';
  switchTab('catdetail');
  try{
    const res=await getManifest();
    if(!res){showCatEmpty(cat,'ยังไม่มีรูปของวันนี้เลย');return;}
    const{m,folder}=res;
    const allImgs=(m.images||[]).map(x=>typeof x==='string'?{file:x,blessing:'',src:null,category:null}:{file:x.file,blessing:x.blessing||''  ,src:x.src||null,category:x.category||null});
    const fromCatField=(m.categories&&m.categories[cat.id]&&m.categories[cat.id].length>0)?m.categories[cat.id]:null;
    const fromImgCat=allImgs.filter(x=>x.category===cat.id);
    const catImages=fromCatField||(fromImgCat.length>0?fromImgCat:null);
    if(!catImages){showCatEmpty(cat,`ยังไม่มีรูป${cat.label}วันนี้`);return;}
    document.getElementById('catdCount').textContent=`${catImages.length} รูป`;
    document.getElementById('catdUseBtn').disabled=false;
    document.getElementById('catdUseBtn').style.opacity='1';
    buildCatDetailGrid(catImages,`${BASE}/img/${folder}`,m.version||'');
  }catch(e){showCatEmpty(cat,'โหลดไม่สำเร็จ ลองใหม่นะคะ');}
}

function showCatEmpty(cat,reason){
  document.getElementById('catdCount').textContent='0 รูป';
  document.getElementById('catdUseBtn').disabled=true;
  document.getElementById('catdUseBtn').style.opacity='0.5';
  const icon=cat?cat.icon:'🌸';
  const label=cat?cat.label:'';
  document.getElementById('catdGrid').innerHTML=
    '<div style="grid-column:1/-1;text-align:center;padding:44px 20px;">'
    +'<div style="font-size:52px;margin-bottom:14px">'+icon+'</div>'
    +'<div style="font-family:Chonburi;font-size:17px;color:#2d1a2e;margin-bottom:10px">'+label+'</div>'
    +'<div style="font-size:14px;color:#9a7a9a;line-height:1.8;margin-bottom:22px">'+reason+'<br>รูปจะเพิ่มขึ้นในวันถัดไปค่ะ</div>'
    +'<button onclick="switchTab(\'category\')" style="background:var(--pink);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-family:Kanit;font-size:15px;font-weight:600;cursor:pointer;">← กลับเลือกหมวดอื่น</button>'
    +'</div>';
}

function buildCatDetailGrid(images,base,version){
  const grid=document.getElementById('catdGrid');grid.innerHTML='';
  if(images.length>0){selectedCatCard=images[0];selectedCatCardIdx=0;}
  images.forEach((c,i)=>{
    const item=document.createElement('div');item.className='catd-item'+(i===0?' selected':'');
    const check=document.createElement('div');check.className='catd-item-check';check.textContent='✓';
    const img=document.createElement('img');img.crossOrigin='anonymous';img.alt='';
    img.src=`${base}/${c.file}?v=${version}`;
    if(c.blessing){
      const bl=document.createElement('div');
      bl.style.cssText='position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0,rgba(0,0,0,.55),transparent);color:#fff;font-size:11px;font-family:Sarabun;padding:6px 6px 8px;line-height:1.3;z-index:2;';
      bl.textContent=c.blessing.slice(0,30)+(c.blessing.length>30?'…':'');
      item.appendChild(bl);
    }
    item.appendChild(img);item.appendChild(check);
    item.addEventListener('click',()=>{
      document.querySelectorAll('.catd-item').forEach(el=>el.classList.remove('selected'));
      item.classList.add('selected');selectedCatCardIdx=i;selectedCatCard=c;
      document.getElementById('catdUseBtn').textContent='✨ ใช้รูปนี้';
    });
    grid.appendChild(item);
  });
}

document.getElementById('catdBack').addEventListener('click',()=>switchTab('category'));
document.getElementById('catdUseBtn').addEventListener('click',async()=>{
  if(!selectedCatCard){toast('กรุณาเลือกรูปก่อนนะคะ');return;}
  const btn=document.getElementById('catdUseBtn');
  btn.textContent='กำลังโหลด…';btn.disabled=true;
  try{
    const res=await getManifest();
    if(!res){toast('โหลดข้อมูลไม่สำเร็จ');return;}
    const{m,folder}=res;
    const base=`${BASE}/img/${folder}`;
    const newCard={file:selectedCatCard.file,blessing:selectedCatCard.blessing||'',src:selectedCatCard.src||null};
    const existing=CARDS.filter(c=>c.file!==newCard.file);
    CARDS.length=0;CARDS.push(newCard,...existing);
    imgBase=base;
    globalIdx=0;cardPtr=0;cardOrder=[];
    for(let slot=0;slot<POOL;slot++){
      const g=globalIdx+circDist(slot,curSlot());
      const cw=cwEls[slot];if(!cw)continue;
      const old=cw.querySelector('.card');
      const fresh=buildFinishedCard(g,CW).querySelector('.card');
      cw.replaceChild(fresh,old);
      cw.style.width=CW+'px';cw.style.height=CW+'px';
      cw.style.marginLeft=(-CW/2)+'px';cw.style.marginTop=(-CW/2)+'px';
      fresh.style.width=CW+'px';fresh.style.height=CW+'px';
    }
    layoutAll(true);buildThumbStrip();
    switchTab('today');
    const catLabel=CATEGORIES.find(c=>c.id===currentCatId)?.label||'';
    toast(`✓ เปลี่ยนรูป${catLabel?(' '+catLabel):''}แล้ว`);
    track2('next');
  }catch(e){toast('เกิดข้อผิดพลาด ลองใหม่นะคะ');}
  finally{btn.textContent='✨ ใช้รูปนี้';btn.disabled=false;btn.style.opacity='1';}
});

/* ── TAB NAVIGATION ─────────────────────────────────────────────────── */
function switchTab(tab){
  const pages={today:'pageToday',category:'pageCategory',catdetail:'pageCatDetail'};
  Object.entries(pages).forEach(([k,id])=>{
    const el=document.getElementById(id);
    el.classList.toggle('active',k===tab);el.classList.toggle('hidden',k!==tab);
  });
  document.getElementById('tabToday').classList.toggle('active',tab==='today');
  document.getElementById('tabCat').classList.toggle('active',tab==='category'||tab==='catdetail');
}

/* ── INIT CAROUSEL ──────────────────────────────────────────────────── */
function initCarousel(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>_initCarouselInner()));
}
function _initCarouselInner(){
  document.getElementById('actions').style.display='';
  computeSizes();
  globalIdx=0;
  combos=Array.from({length:POOL},(_,sl)=>cardFor(globalIdx+circDist(sl,curSlot())));
  cwEls=Array.from({length:POOL},(_,sl)=>buildFinishedCard(globalIdx+circDist(sl,curSlot()),CW));
  stage.innerHTML='';cwEls.forEach(cw=>stage.appendChild(cw));
  layoutAll(false);
  attachSwipe();
  buildThumbStrip();
  CARDS.forEach(c=>{const im=new Image();im.crossOrigin='anonymous';im.src=`${imgBase}/${c.file}?v=${M&&M.version?M.version:''}`;});
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>requestAnimationFrame(relayout));}
}

/* ── BOOT ───────────────────────────────────────────────────────────── */
async function boot(){
  track2('open');
  if(REPO.includes('REPO_NAME')){stage.innerHTML=`<div class="msg">⚠️ ยังไม่ได้ตั้งค่า — แก้ <code>const REPO</code> ให้เป็นรีโปจริงก่อน</div>`;return;}
  const ict=new Date(Date.now()+7*3600*1000);
  const todayISO=`${ict.getUTCFullYear()}-${String(ict.getUTCMonth()+1).padStart(2,'0')}-${String(ict.getUTCDate()).padStart(2,'0')}`;
  const tryLoad=async folder=>{
    const r=await fetch(`${BASE}/img/${folder}/manifest.json?v=${Date.now()}`,{cache:'no-store'});
    if(!r.ok)throw new Error('manifest '+r.status);return r.json();
  };
  let folder=todayISO;
  try{M=await tryLoad(todayISO);}
  catch{try{M=await tryLoad('evergreen');folder='evergreen';}
  catch{stage.innerHTML=`<div class="msg">ยังไม่มีรูปของวันนี้ 😴<br><br>รอรอบ gen สักครู่ หรือไปที่ <b>Actions → Run workflow</b></div>`;return;}}
  // set manifest cache ด้วย เพื่อให้ category ใช้ข้อมูลเดียวกันได้ทันที
  _manifestCache=M; _manifestFolder=folder;
  imgBase=`${BASE}/img/${folder}`;
  CARDS=(M.images||[]).map(x=>typeof x==='string'?{file:x,blessing:'',src:null}:{file:x.file,blessing:x.blessing||'',src:x.src||null}).filter(c=>c.file);
  if(!CARDS.length){stage.innerHTML=`<div class="msg">ยังไม่มีรูปของวันนี้ 😴<br><br>รอรอบ gen สักครู่นะคะ</div>`;return;}

  if(!M.color){
    const _dc=['#C0392B','#E1A100','#D6336C','#1E9E55','#E8730C','#1F73C4','#7E3FAE'];
    const _d2=['#7d1f17','#8a5d00','#8a1d44','#0f5e31','#9c4a05','#0f4677','#4a2069'];
    const _w=new Date(Date.now()+7*3600*1000).getUTCDay();
    M.color=_dc[_w];M.color2=_d2[_w];
  }

  // อัปเดตวันที่ใน header
  document.getElementById('dateLine').textContent=M.dateThai||'';
  // ขึ้น N ค่ำ เดือน N — คำนวณแบบง่ายจากปฏิทินไทย (ถ้า manifest มี lunarDate ใช้เลย)
  const lunarEl=document.getElementById('dateLunar');
  if(M.lunarDate){lunarEl.textContent=M.lunarDate;}
  else if(M.wanPhra){lunarEl.textContent='🕯️ วันพระ';}
  else{lunarEl.textContent='';}
  // day badge ขวา
  const badgeText=document.getElementById('dayBadgeText');
  const badgeRow=document.getElementById('dayBadge');
  if(M.isFestival&&M.festival){
    badgeText.textContent=M.festival;
    badgeRow.querySelector('span:first-child').textContent='🌸';
  } else if(M.wanPhra){
    badgeText.textContent='วันพระ';
    badgeRow.querySelector('span:first-child').textContent='🕯️';
  } else {
    badgeText.textContent=M.dayTh||'วันนี้';
    badgeRow.querySelector('span:first-child').textContent='🌸';
  }

  initCarousel();
  buildCatGrid();
}

window.addEventListener('resize',()=>{
  requestAnimationFrame(relayout);
  const nav=document.getElementById('thumbNav');
  if(nav)nav.style.display=window.innerWidth>480?'flex':'';
});
window.addEventListener('load',()=>{if(CW>0)requestAnimationFrame(relayout);});

boot();
</script>
