<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ink:#2b2118;--gold:#b8893b;--gold2:#e7c46a}
html,body{
  height:100%;overflow:hidden;
  font-family:'Sarabun',sans-serif;color:var(--ink);
  background:radial-gradient(1200px 600px at 50% -10%,#fff8ec 0%,transparent 60%),
             linear-gradient(160deg,#f3e9d6 0%,#ece0c8 100%);
  overscroll-behavior:none;
}
.app{
  display:flex;flex-direction:column;align-items:center;
  height:100%;max-width:480px;margin:0 auto;
  padding:18px 0 20px;gap:12px;
}

/* HEADER */
.header{text-align:center;flex-shrink:0;padding:0 20px;width:100%}
.header .mark{font-family:'Kanit';font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.header h1{font-family:'Chonburi';font-size:22px;color:var(--ink);margin:2px 0 0}
.header .dl{font-size:12px;color:#8a7560;margin-top:2px}

/* STAGE */
.stage{
  position:relative;width:100%;flex:1;min-height:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* card wrapper — absolute centred, moved by JS */
.cw{
  position:absolute;left:50%;top:50%;
  transform-origin:center center;
  transition:transform .44s cubic-bezier(.34,1.1,.64,1),
             opacity   .38s ease,
             filter    .38s ease;
  cursor:grab;user-select:none;touch-action:pan-y;
}
.cw.no-anim{transition:none!important}

.card{
  position:relative;border-radius:20px;overflow:hidden;background:#1a1208;
  transition:box-shadow .44s ease;
}
.card img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:opacity .25s}
.scrim{position:absolute;inset:0;z-index:1}
.frame-el{display:none}
.frame-before{position:absolute;pointer-events:none;transition:all .4s ease}
.corner{position:absolute;width:44px;height:44px;z-index:5;transition:opacity .3s}
.corner.tl{top:6px;left:6px}.corner.tr{top:6px;right:6px;transform:scaleX(-1)}
.corner.bl{bottom:6px;left:6px;transform:scaleY(-1)}.corner.br{bottom:6px;right:6px;transform:scale(-1,-1)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;z-index:3;color:#fff}
.hello{font-family:'Chonburi';line-height:1.15;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.bless{font-family:'Charm';font-weight:700;line-height:1.45;text-shadow:0 1px 8px rgba(0,0,0,.55)}
.date{font-family:'Sarabun';font-size:12px;opacity:.92;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.sparkle{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;
  box-shadow:0 0 8px 2px rgba(255,255,255,.8);z-index:2;pointer-events:none}

/* PROGRESS SEGMENTS */
.dots{display:flex;gap:4px;align-items:center;flex-shrink:0;padding:2px 0;width:160px}
.dot{
  height:4px;border-radius:3px;
  background:var(--gold);
  transition:opacity .35s ease, transform .35s ease;
  flex:1;
}
.dot.ahead{opacity:.15;}
.dot.done{opacity:.55;}
.dot.active{opacity:1;transform:scaleY(2.5);transform-origin:center;}

/* ACTIONS */
.actions{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px;flex-shrink:0}
.btn{border:none;border-radius:14px;padding:15px;font-family:'Kanit';font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s}
.btn:active{transform:scale(.95)}.btn:disabled{opacity:.5}
.btn.copy{background:#fff;color:var(--ink);border:1.5px solid #ddd0bc;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.btn.save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3a2410;box-shadow:0 4px 16px rgba(180,130,40,.32)}

/* error/loading msg */
.msg{text-align:center;padding:40px 20px;color:#7a6a52;font-size:14px;line-height:1.7}
.msg code{background:#fff;padding:2px 6px;border-radius:6px;border:1px solid #e0d0b0;font-size:12px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 20px;border-radius:24px;font-family:'Kanit';font-size:13px;z-index:99;
  opacity:0;transition:.25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>

let M=null;

let lastBlIdx=-1;

function hexA(hex,a){try{const n=parseInt(hex.replace('#',''),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}catch{return`rgba(0,0,0,${a})`;}}
function scrimCSS(p,color,c2){
  color=color||'#b8893b';c2=c2||'#6b4c1e';
  const tint=`radial-gradient(120% 90% at 50% 42%,${hexA(color,.04)} 0%,${hexA(c2,.28)} 100%)`;
  const m={
    bottom:`linear-gradient(180deg,rgba(0,0,0,.10) 0%,rgba(0,0,0,0) 38%,rgba(0,0,0,.22) 62%,rgba(0,0,0,.68) 100%)`,
    top:   `linear-gradient(0deg,rgba(0,0,0,.06) 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,.20) 62%,rgba(0,0,0,.64) 100%)`,
    left:  `linear-gradient(90deg,rgba(0,0,0,.66) 0%,rgba(0,0,0,.18) 48%,rgba(0,0,0,0) 72%)`,
    right: `linear-gradient(270deg,rgba(0,0,0,.66) 0%,rgba(0,0,0,.18) 48%,rgba(0,0,0,0) 72%)`,
    center:`radial-gradient(closest-side,rgba(0,0,0,.52) 0%,rgba(0,0,0,.16) 62%,rgba(0,0,0,0) 100%)`,
  };
  return`${m[p]||m.bottom}, ${tint}`;
}

function pickPool(arr,used,max){
  if(used.length>=arr.length)used.length=0;
  let idx,t=0;
  do{idx=Math.floor(Math.random()*arr.length);t++;}while(used.includes(idx)&&t<20);
  used.push(idx);if(used.length>max)used.shift();
  return{item:arr[idx],idx};
}
function pickBless(){
  const FALLBACK=['ขอให้มีความสุขตลอดวัน','สุขภาพแข็งแรง คิดสิ่งใดสมหวัง','ขอให้โชคดีมีแต่สิ่งดีๆ','วันนี้ขอให้สดใส เบาสบายใจ','ขอให้ทุกก้าวพบเจอสิ่งมงคล','รอยยิ้มสดใส รับวันใหม่'];
  const pool=(M?.blessings?.length>=2)?M.blessings:(M?.blessings||[]).concat(FALLBACK);
  const{item,idx}=pickPool(pool,uBl,Math.max(3,Math.floor(pool.length/2)));
  lastBlIdx=idx; return item;
}
function mkCombo(){
  const imgRes = pickPool(M.images,   uImg, Math.max(4,Math.floor(M.images.length/2)));
  const frRes  = pickPool(FRAMES,     uFr,  6);
  const layRes = pickPool(LAYOUTS,    uLay, 4);
  const txRes  = pickPool(TEXT_SIZES, uTx,  3);
  const ovRes  = pickPool(OVERLAYS,   uOv,  3);
  return{imgSrc:`${BASE}/${imgRes.item}?v=${M.version}`, fr:frRes.item, lay:layRes.item, bl:pickBless(), tx:txRes.item, ov:ovRes.item};
}

/* ── BUILD CARD DOM ─────────────────────────────────────────────────── */
function buildCard(cb,CW){
  const{imgSrc,fr,lay,bl,tx,ov}=cb;
  const cw=document.createElement('div'); cw.className='cw';
  cw.style.width=CW+'px'; cw.style.height=CW+'px';
  cw.style.marginLeft=(-CW/2)+'px'; cw.style.marginTop=(-CW/2)+'px';

  const card=document.createElement('div'); card.className='card';
  card.style.width=CW+'px'; card.style.height=CW+'px';

  // bg
  const bg=document.createElement('img'); bg.className='bg'; bg.crossOrigin='anonymous';
  bg.style.opacity='0'; bg.onload=()=>bg.style.opacity='1'; bg.src=imgSrc;
  // overlay effect บน bg image
  if(ov&&ov.cssFilter) bg.style.filter=ov.cssFilter;
  card.appendChild(bg);

  // scrim
  const sc=document.createElement('div'); sc.className='scrim';
  sc.style.background=scrimCSS(lay.scrim,M.color,M.color2);
  card.appendChild(sc);

  // กรอบ: ใช้ box-shadow inset บน card โดยตรง — ไม่โดน overflow:hidden ตัด
  applyFrameToCard(card, fr);

  // text content — ใช้ tx multiplier
  const L=lay;
  const hs = Math.round((tx?tx.hs_mul:1) * L.hs);
  const bsz= Math.round((tx?tx.bs_mul:1) * L.bs);
  const gap= tx ? tx.gap : 8;
  const content=document.createElement('div'); content.className='content';
  content.style.cssText=`padding:${L.pad};justify-content:${L.j};align-items:${L.a};text-align:${L.ta}`;
  const tb=document.createElement('div');
  tb.style.cssText=`display:flex;flex-direction:column;gap:${gap}px;max-width:${L.narrow?'56%':'92%'};align-items:${L.ta==='left'?'flex-start':L.ta==='right'?'flex-end':'center'}`;
  if(L.rot)tb.style.transform=`rotate(${L.rot}deg)`;
  if(L.panel)tb.style.cssText+=`;background:rgba(0,0,0,.34);padding:16px 20px;border-radius:16px;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(3px)`;

  const h=document.createElement('div'); h.className='hello';

  h.textContent=M.headline||('สวัสดีวัน'+M.dayTh);
  const blEl=document.createElement('div'); blEl.className='bless'; blEl.style.fontSize=bsz+'px'; blEl.textContent=bl;
  const dt=document.createElement('div'); dt.className='date'; dt.textContent=M.dateThai;
  tb.append(h,blEl,dt); content.appendChild(tb); card.appendChild(content);

  for(let i=0;i<7;i++){
    const s=document.createElement('div'); s.className='sparkle';
    s.style.cssText=`left:${8+Math.random()*84}%;top:${8+Math.random()*84}%;opacity:${.4+Math.random()*.6};transform:scale(${.6+Math.random()})`;
    card.appendChild(s);
  }
  cw.appendChild(card);
  return cw;
}

/* ── APPLY FRAME TO CARD (DOM display) ──────────────────────────────── */
// ใช้ box-shadow inset ซ้อนกัน — ไม่โดน overflow:hidden ตัด
// layer 1 (ด้านนอก): สีพื้นหลังซ่อนส่วนก่อนถึงเส้นกรอบ
// layer 2: เส้นกรอบหลัก
// layer 3: เส้นใน (before)
// layer 4: outer glow
function applyFrameToCard(card, fr){
  const ins = parseFloat(fr.ins)||0;
  const brdPts = fr.brd && fr.brd!=='none' ? fr.brd.trim().split(/\s+/) : null;
  const shadows = [];

  // corner SVG — เพิ่มลงใน card
  card.querySelectorAll('.corner').forEach(c=>c.remove());
  if(fr.co){
    ['tl','tr','bl','br'].forEach(cls=>{
      const co=document.createElement('div'); co.className='corner '+cls;
      co.innerHTML=fr.co; co.style.zIndex='6'; card.appendChild(co);
    });
  }

  if(brdPts){
    const bw  = parseFloat(brdPts[0])||2;
    const bc  = brdPts[brdPts.length-1];
    const type= brdPts[1]||'solid';

    // เส้นกรอบหลัก: inset spread = ins+bw (วาดจากขอบเข้ามา ins px แล้วหนา bw)
    // ใช้คู่ — spread ใหญ่สีกรอบ + spread เล็กกว่า bw สีดำโปร่งใส ซ่อนส่วนใน
    // วิธีที่ได้ผลชัดสุด: paint border ด้วย 2 inset shadows
    shadows.push(`inset 0 0 0 ${ins+bw}px ${bc}`);       // เส้นนอก
    shadows.push(`inset 0 0 0 ${ins}px rgba(0,0,0,0)`);  // placeholder (ไม่มีผลจริง แต่ทำให้อ่านชัด)

    if(type==='double'){
      const gap=bw*1.5;
      shadows.push(`inset 0 0 0 ${ins+bw+gap}px ${bc}`);
    }

    // before line
    if(fr.bb && fr.bb!=='none'){
      const bp  = fr.bb.trim().split(/\s+/);
      const bw2 = parseFloat(bp[0])||1;
      const bc2 = bp[bp.length-1];
      const bi  = parseFloat(fr.bi)||0;
      const pos = ins+bw+bi;
      shadows.push(`inset 0 0 0 ${pos+bw2}px ${bc2}`);
    }
  }

  // outer glow/shadow จาก fr.bs
  if(fr.bs && fr.bs!=='none'){
    fr.bs.split(',').forEach(s=>{
      if(!s.trim().startsWith('inset')) shadows.push(s.trim());
    });
  }

  card.style.boxShadow = shadows.filter(Boolean).join(', ');
}

/* ── SIZING ─────────────────────────────────────────────────────────── */
const stage=document.getElementById('stage');
let CW=0, SIDE_SCALE=0.78, SIDE_OFFSET=0, SIDE_Y=0;
function computeSizes(){
  const sw=stage.offsetWidth, sh=stage.offsetHeight;
  CW          = Math.min(Math.round(sw*.78), sh-16);
  SIDE_SCALE  = 0.78;
  SIDE_OFFSET = Math.round(sw*.62);
  SIDE_Y      = Math.round(CW*.06);
}

/* ── CAROUSEL STATE ─────────────────────────────────────────────────── */
const POOL=7, DOT_N=7, PROGRESS_MAX=28; // 28 swipe = เต็ม (4 รอบ × 7 segments)
let combos=[],cwEls=[],globalIdx=0;
function curSlot(){return((globalIdx%POOL)+POOL)%POOL;}

function circDist(i,c){
  let d=i-c;
  if(d> POOL/2)d-=POOL;
  if(d<-POOL/2)d+=POOL;
  return d;
}
function posFor(i){
  const d=circDist(i,curSlot());
  if(d===0) return{tx:0,           ty:0,        sc:1,          op:1,  br:1,  z:10,sh:'0 28px 60px rgba(50,28,5,.42),0 8px 20px rgba(50,28,5,.24)'};
  if(d===1) return{tx: SIDE_OFFSET,ty:SIDE_Y,   sc:SIDE_SCALE, op:.78,br:.82,z:5, sh:'0 8px 20px rgba(50,28,5,.14)'};
  if(d===-1)return{tx:-SIDE_OFFSET,ty:SIDE_Y,   sc:SIDE_SCALE, op:.78,br:.82,z:5, sh:'0 8px 20px rgba(50,28,5,.14)'};
  const fx=SIDE_OFFSET+Math.abs(d)*CW*.08;
  return{tx:d>0?fx:-fx, ty:SIDE_Y+12, sc:SIDE_SCALE*.84, op:.22,br:.55,z:0, sh:'none'};
}
function applyPos(cw,p,anim){
  const card=cw.querySelector('.card');
  if(!anim)cw.classList.add('no-anim'); else cw.classList.remove('no-anim');
  if(!anim)cw.offsetHeight;
  cw.style.transform=`translate(${p.tx}px,${p.ty}px) scale(${p.sc})`;
  cw.style.opacity=p.op; cw.style.zIndex=p.z;
  cw.style.filter=p.br>=1?'none':`brightness(${p.br})`;
  if(card)card.style.boxShadow=p.sh;
  if(!anim)requestAnimationFrame(()=>cw.classList.remove('no-anim'));
}
function layoutAll(anim=true){cwEls.forEach((cw,i)=>applyPos(cw,posFor(i),anim));updateDots();}

function refreshSlot(slot){
  combos[slot]=mkCombo();
  const cw=cwEls[slot];
  const old=cw.querySelector('.card');
  const fresh=buildCard(combos[slot],CW).querySelector('.card');
  cw.replaceChild(fresh,old);
  // sync size in case resize happened
  cw.style.width=CW+'px'; cw.style.height=CW+'px';
  cw.style.marginLeft=(-CW/2)+'px'; cw.style.marginTop=(-CW/2)+'px';
  fresh.style.width=CW+'px'; fresh.style.height=CW+'px';
}

/* ── DOTS ───────────────────────────────────────────────────────────── */
const dotsEl=document.getElementById('dotsEl');
function buildDots(){
  dotsEl.innerHTML='';
  for(let i=0;i<DOT_N;i++){
    const d=document.createElement('div');
    d.className='dot ahead';
    dotsEl.appendChild(d);
  }
}
function updateDots(){
  // swipeCount = abs(globalIdx) สะท้อน progress จริง (ไม่ loop)
  const count=Math.abs(globalIdx);
  // แบ่ง progress เป็น DOT_N ช่อง — แต่ละช่องครอบคลุม PROGRESS_MAX/DOT_N swipe
  const filled=Math.min(count/PROGRESS_MAX, 1); // 0.0–1.0
  const filledSegs=filled*DOT_N; // เช่น 3.5 = 3 ช่องเต็ม + ช่องที่ 4 ครึ่งนึง
  const fullSegs=Math.floor(filledSegs);
  const partial=filledSegs-fullSegs; // 0.0–1.0 ส่วนที่เหลือของ segment ปัจจุบัน

  [...dotsEl.querySelectorAll('.dot')].forEach((d,i)=>{
    d.className='dot';
    d.style.opacity='';
    if(i<fullSegs){
      // ช่องที่ผ่านมาแล้ว
      d.classList.add('done');
    } else if(i===fullSegs && count>0){
      // ช่อง active ปัจจุบัน — opacity สัดส่วนตาม partial
      d.classList.add('active');
      d.style.opacity=0.45+partial*0.55; // 0.45 → 1.0
    } else {
      // ช่องที่ยังไม่ถึง
      d.classList.add('ahead');
    }
  });
}

/* ── SWIPE ──────────────────────────────────────────────────────────── */
function attachSwipe(){
  let sx=0,sy=0,dx=0,dragging=false,horiz=null;
  const THRESH=50;
  const lerp=(a,b,t)=>a+(b-a)*t;

  function liveLayout(rawDx){
    const frac=Math.min(Math.abs(rawDx)/(CW*.55),1);
    const dir=rawDx<0?1:-1;
    cwEls.forEach((cw,i)=>{
      const fromP=posFor(i);
      const nc=((( curSlot()+dir)%POOL)+POOL)%POOL;
      const d2=circDist(i,nc);
      const fx2=SIDE_OFFSET+Math.abs(d2)*CW*.08;
      const toP={
        tx:d2===0?0:d2===1?SIDE_OFFSET:d2===-1?-SIDE_OFFSET:d2>0?fx2:-fx2,
        ty:d2===0?0:Math.abs(d2)===1?SIDE_Y:SIDE_Y+12,
        sc:d2===0?1:Math.abs(d2)===1?SIDE_SCALE:SIDE_SCALE*.84,
        op:d2===0?1:Math.abs(d2)===1?.78:.22,
        br:d2===0?1:Math.abs(d2)===1?.82:.55,
        sh:d2===0?'0 28px 60px rgba(50,28,5,.42)':Math.abs(d2)===1?'0 8px 20px rgba(50,28,5,.14)':'none',
      };
      const card=cw.querySelector('.card');
      const liveX=lerp(fromP.tx,toP.tx,frac)+(i===curSlot()?rawDx:0);
      cw.style.transform=`translate(${liveX}px,${lerp(fromP.ty,toP.ty,frac)}px) scale(${lerp(fromP.sc,toP.sc,frac)})`;
      cw.style.opacity=lerp(fromP.op,toP.op,frac)+'';
      cw.style.filter=`brightness(${lerp(fromP.br,toP.br,frac)})`;
      if(card)card.style.boxShadow=frac>.5?toP.sh:fromP.sh;
    });
  }

  function onStart(x,y){sx=x;sy=y;dx=0;dragging=true;horiz=null;cwEls.forEach(cw=>cw.classList.add('no-anim'));}
  function onMove(x,y){
    if(!dragging)return; dx=x-sx;
    const dy=y-sy;
    if(horiz===null&&(Math.abs(dx)>6||Math.abs(dy)>6))horiz=Math.abs(dx)>=Math.abs(dy);
    if(!horiz)return;
    liveLayout(dx);
  }
  function onEnd(){
    if(!dragging)return; dragging=false;
    cwEls.forEach(cw=>cw.classList.remove('no-anim'));
    if(horiz&&Math.abs(dx)>=THRESH){
      if(dx<0){globalIdx++;refreshSlot(((globalIdx+2)%POOL+POOL)%POOL);}
      else    {globalIdx--;refreshSlot(((globalIdx-2)%POOL+POOL)%POOL);}
      track2('next');
    }
    layoutAll(true);
  }
  stage.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',()=>{if(dragging)onEnd();});
  stage.addEventListener('touchstart',e=>onStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  stage.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX,e.touches[0].clientY);if(horiz)e.preventDefault();},{passive:false});
  stage.addEventListener('touchend',()=>onEnd());
}

/* ── DRAW FRAME ONTO CANVAS ─────────────────────────────────────────── */
// logic เดียวกับ applyFrameToCard แต่วาดลง canvas แทน DOM
// canvas scale=2 → 1px CSS = 2px canvas
function drawFrameOnCanvas(ctx,w,h,fr){
  if(!fr)return;
  const S=2;
  const ins=(parseFloat(fr.ins)||0)*S;
  const br =(parseFloat(fr.br) ||0)*S;
  const brdPts=fr.brd&&fr.brd!=='none'?fr.brd.trim().split(/\s+/):null;

  function roundRect(x,y,rw,rh,rad){
    rad=Math.max(0,Math.min(rad,rw/2,rh/2));
    ctx.beginPath();
    if(rad===0){ctx.rect(x,y,rw,rh);return;}
    ctx.moveTo(x+rad,y); ctx.lineTo(x+rw-rad,y); ctx.quadraticCurveTo(x+rw,y,x+rw,y+rad);
    ctx.lineTo(x+rw,y+rh-rad); ctx.quadraticCurveTo(x+rw,y+rh,x+rw-rad,y+rh);
    ctx.lineTo(x+rad,y+rh); ctx.quadraticCurveTo(x,y+rh,x,y+rh-rad);
    ctx.lineTo(x,y+rad); ctx.quadraticCurveTo(x,y,x+rad,y);
    ctx.closePath();
  }

  function drawLine(offset, lw, color, dash){
    if(!color||color==='none')return;
    const half=lw/2;
    const x=offset+half, y=offset+half;
    const rw=w-offset*2-lw, rh=h-offset*2-lw;
    const r=Math.max(br-offset,0);
    ctx.save();
    ctx.strokeStyle=color; ctx.lineWidth=lw;
    ctx.setLineDash(dash||[]);
    roundRect(x,y,rw,rh,r);
    ctx.stroke();
    ctx.restore();
  }

  if(brdPts){
    const bw  =(parseFloat(brdPts[0])||2)*S;
    const type= brdPts[1]||'solid';
    const bc  = brdPts[brdPts.length-1];
    // เส้นหลัก: วาดที่ offset = ins, หนา bw
    drawLine(ins, bw, bc, type==='dashed'?[8*S,5*S]:null);
    if(type==='double'){
      const gap=bw*1.5;
      drawLine(ins+gap, bw*0.5, bc, null);
    }
    // before line
    if(fr.bb&&fr.bb!=='none'){
      const bp  =fr.bb.trim().split(/\s+/);
      const bw2 =(parseFloat(bp[0])||1)*S;
      const bc2 =bp[bp.length-1];
      const type2=bp[1]||'solid';
      const bi  =(parseFloat(fr.bi)||0)*S;
      drawLine(ins+bw+bi, bw2, bc2, type2==='dashed'?[6*S,4*S]:null);
    }
  }
}

/* ── SNAPSHOT ───────────────────────────────────────────────────────── */
async function snapshot(){
  const card=cwEls[curSlot()].querySelector('.card');
  const combo=combos[curSlot()];
  const fr=combo?.fr;
  const ov=combo?.ov;
  // clone card ก่อน snapshot — ลบ filter บน img เพราะ html2canvas ไม่รองรับ css filter
  // แทนที่ด้วย canvasFn หลัง render
  const bgImg=card.querySelector('img.bg');
  const savedFilter=bgImg?bgImg.style.filter:'';
  if(bgImg)bgImg.style.filter='';
  const canvas=await html2canvas(card,{useCORS:true,scale:2,backgroundColor:null,logging:false});
  if(bgImg)bgImg.style.filter=savedFilter;
  const ctx=canvas.getContext('2d');
  // apply overlay effect
  if(ov&&ov.canvasFn) ov.canvasFn(ctx,canvas.width,canvas.height);
  drawFrameOnCanvas(ctx,canvas.width,canvas.height,fr);
  return canvas;
}

/* ── ACTIONS ────────────────────────────────────────────────────────── */
document.getElementById('btnCopy').onclick=async()=>{
  const btn=document.getElementById('btnCopy');
  const orig=btn.textContent; btn.textContent='กำลังเตรียม…'; btn.disabled=true;
  try{
    const c=await snapshot();
    // ตรวจว่า clipboard API ใช้ได้ไหม (LINE WebView ไม่ support)
    const canClip=!!(window.ClipboardItem&&navigator.clipboard?.write);
    if(canClip){
      c.toBlob(async b=>{
        try{
          await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);
          toast('คัดลอกแล้ว พร้อมแปะใน LINE ✓');trackGC('copy');track2('copy');
        }catch{
          // clipboard ล้มเหลว → fallback download
          triggerDownload(c);
          toast('คัดลอกไม่ได้ — บันทึกรูปแล้วแทน แล้วแนบใน LINE');
        }
        btn.textContent=orig; btn.disabled=false;
      },'image/png');
    } else {
      // LINE / WebView — ไม่มี clipboard API → download แทนทันที
      triggerDownload(c);
      toast('เปิดใน LINE: กดค้างที่รูปเพื่อแชร์ได้เลย');trackGC('copy');track2('copy');
      btn.textContent=orig; btn.disabled=false;
    }
  }catch{toast('ไม่สำเร็จ ลองกดบันทึกแทน');btn.textContent=orig;btn.disabled=false;}
};
function triggerDownload(canvas){
  const a=document.createElement('a');
  a.download=`${M.headline||'สวัสดีวันนี้'}.png`;
  a.href=canvas.toDataURL('image/png'); a.click();
  trackGC('download'); track2('download');
}
document.getElementById('btnSave').onclick=async()=>{
  const btn=document.getElementById('btnSave');const t=btn.textContent;btn.textContent='กำลังบันทึก…';btn.disabled=true;
  try{
    const c=await snapshot();const a=document.createElement('a');
    a.download=`${M.headline||'สวัสดีวันนี้'}.png`;a.href=c.toDataURL('image/png');a.click();
    toast('บันทึกแล้ว ✓');trackGC('download');track2('download');
  }catch{toast('บันทึกไม่สำเร็จ ลองแคปหน้าจอแทน');}
  finally{btn.textContent=t;btn.disabled=false;}
};

/* ── INIT CAROUSEL ──────────────────────────────────────────────────── */
function initCarousel(){
  computeSizes();
  globalIdx=0; uImg=[];uFr=[];uLay=[];uBl=[];uTx=[];uOv=[];
  combos=Array.from({length:POOL},()=>mkCombo());
  cwEls=combos.map(c=>buildCard(c,CW));
  stage.innerHTML='';
  cwEls.forEach(cw=>stage.appendChild(cw));
  layoutAll(false);
  buildDots();
  attachSwipe();
  document.getElementById('actions').style.display='';
  // preload รูปที่เหลือ
  M.images.forEach(src=>{const im=new Image();im.crossOrigin='anonymous';im.src=`${BASE}/${src}?v=${M.version}`;});
}

/* ── BOOT ───────────────────────────────────────────────────────────── */
async function boot(){
  track2('open');
  if(REPO.includes('REPO_NAME')){
    stage.innerHTML=`<div class="msg">⚠️ ยังไม่ได้ตั้งค่า — แก้ <code>const REPO</code> ให้เป็นรีโปจริงก่อน</div>`;
    document.getElementById('dateLine').textContent=''; return;
  }
  try{
    const res=await fetch(`${BASE}/manifest.json?v=${Date.now()}`,{cache:'no-store'});
    if(!res.ok)throw new Error('manifest '+res.status);
    M=await res.json();
  }catch{
    stage.innerHTML=`<div class="msg">ยังไม่มีรูปของวันนี้ 😴<br><br>รอรอบ gen ตอนดึก หรือไปที่ <b>Actions → Run workflow</b></div>`;
    document.getElementById('dateLine').textContent=''; return;
  }
  document.getElementById('dateLine').textContent=M.dateThai||'';
  if(M.isFestival)document.getElementById('topTitle').textContent=M.headline||'สวัสดีวันนี้';
  initCarousel();
}

window.addEventListener('resize',()=>{
  computeSizes();
  cwEls.forEach((cw,i)=>{
    cw.style.width=CW+'px'; cw.style.height=CW+'px';
    cw.style.marginLeft=(-CW/2)+'px'; cw.style.marginTop=(-CW/2)+'px';
    const card=cw.querySelector('.card');
    if(card){card.style.width=CW+'px';card.style.height=CW+'px';}
  });
  layoutAll(false);
});

boot();
</script>
