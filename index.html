<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สวัสดีวันนี้ ☀️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Charm:wght@400;700&family=Mitr:wght@500;600&family=Kanit:wght@600&family=Itim&family=Mali:wght@600&family=Sriracha&family=Pattaya&family=Bai+Jamjuree:wght@600&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script data-goatcounter="https://leomcpemail.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
  :root{ --ink:#2b2118; --gold:#b8893b; --gold2:#e7c46a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Sarabun',sans-serif; color:var(--ink); min-height:100vh; padding:18px 14px 40px; line-height:1.5;
    background:
      radial-gradient(1200px 600px at 50% -10%, #fff8ec 0%, transparent 60%),
      linear-gradient(160deg,#f3e9d6 0%, #ece0c8 100%);
  }
  .wrap{max-width:460px;margin:0 auto}
  .top{text-align:center;margin-bottom:14px}
  .top .mark{font-family:'Kanit';letter-spacing:.18em;font-size:11px;color:var(--gold);text-transform:uppercase}
  .top h1{font-family:'Chonburi';font-size:24px;color:var(--ink);margin:4px 0 0}
  .top p{font-size:13px;color:#7a6a52}

  .stage{margin:8px auto 0;width:100%;max-width:420px}
  .card{position:relative;width:100%;aspect-ratio:1/1;border-radius:18px;overflow:hidden;
    box-shadow:0 18px 40px rgba(80,50,10,.28);background:#1a1208}
  .card img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:opacity .25s}
  .scrim{position:absolute;inset:0}
  .frame{position:absolute;inset:14px;border:2px solid rgba(255,255,255,.85);border-radius:10px;pointer-events:none;z-index:4}
  .frame:before{content:"";position:absolute;inset:5px;border:1px solid rgba(255,255,255,.55);border-radius:7px}
  .corner{position:absolute;width:46px;height:46px}
  .corner.tl{top:6px;left:6px}.corner.tr{top:6px;right:6px;transform:scaleX(-1)}
  .corner.bl{bottom:6px;left:6px;transform:scaleY(-1)}.corner.br{bottom:6px;right:6px;transform:scale(-1)}

  .content{position:absolute;inset:22px;display:flex;flex-direction:column;z-index:3;color:#fff}
  #textBlock{display:flex;flex-direction:column;gap:8px}
  .hello{font-family:'Chonburi';line-height:1.15;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .bless{font-family:'Charm';font-weight:700;line-height:1.45;text-shadow:0 1px 8px rgba(0,0,0,.55)}
  .date{font-family:'Sarabun';font-size:12px;opacity:.92;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .sparkle{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px rgba(255,255,255,.8);z-index:2}
  .pill{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.42);
    color:#fff;font-family:'Kanit';font-size:11px;padding:4px 12px;border-radius:20px;backdrop-filter:blur(4px);white-space:nowrap}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .btn{border:none;border-radius:12px;padding:13px;font-family:'Kanit';font-size:14px;cursor:pointer;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3a2a10;font-weight:600}
  .btn.ghost{background:#fff;border:1px solid #e0d0b0;color:var(--ink)}
  .btn.span2{grid-column:1 / -1}
  .btn:active{transform:scale(.97)} .btn:disabled{opacity:.5}

  .msg{text-align:center;padding:40px 20px;color:#7a6a52;font-size:14px;line-height:1.7}
  .msg code{background:#fff;padding:2px 6px;border-radius:6px;border:1px solid #e0d0b0;font-size:12px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2b2118;color:#fff;
    padding:11px 20px;border-radius:24px;font-family:'Kanit';font-size:13px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
  .toast.on{opacity:1}
  .hint{text-align:center;font-size:11px;color:#9a8765;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="mark">Daily Greeting</div>
    <h1 id="topTitle">สวัสดีวันนี้</h1>
    <p id="dateLine">กำลังโหลด…</p>
  </div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ====== ตั้งค่า: ใส่ user/repo ของคุณ ====== */
const REPO = "leomcpemail-source/greeting";
const BRANCH = "daily-images";
const BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

const $=id=>document.getElementById(id);
let M=null, order=[], pos=0, rejected=new Set(), layoutSalt=Math.floor(Math.random()*100);

/* ====== เทมเพลตเลย์เอาต์: ฟอนต์ + ตำแหน่ง + เอียง + แนวตั้ง + แผง ====== */
const LAYOUTS = [
  {font:'Chonburi',     j:'flex-end',  a:'center',     ta:'center', rot:0,  scrim:'bottom', panel:false, narrow:false, hs:38, bs:21, pad:'22px 26px 30px'},
  {font:'Mitr',         j:'flex-end',  a:'flex-start', ta:'left',   rot:0,  scrim:'bottom', panel:false, narrow:false, hs:34, bs:20, pad:'22px 26px 34px'},
  {font:'Kanit',        j:'flex-start',a:'center',     ta:'center', rot:0,  scrim:'top',    panel:false, narrow:false, hs:34, bs:19, pad:'30px 26px'},
  {font:'Charm',        j:'center',    a:'center',     ta:'center', rot:-8, scrim:'center', panel:true,  narrow:false, hs:36, bs:22, pad:'22px'},
  {font:'Itim',         j:'flex-start',a:'flex-end',   ta:'right',  rot:0,  scrim:'top',    panel:false, narrow:false, hs:32, bs:19, pad:'30px 28px'},
  {font:'Sriracha',     j:'flex-end',  a:'center',     ta:'center', rot:0,  scrim:'bottom', panel:true,  narrow:false, hs:31, bs:20, pad:'22px 24px 30px'},
  {font:'Mali',         j:'center',    a:'flex-end',   ta:'right',  rot:0,  scrim:'right',  panel:false, narrow:true,  hs:34, bs:20, pad:'22px 28px'},
  {font:'Bai Jamjuree', j:'center',    a:'center',     ta:'center', rot:0,  scrim:'center', panel:true,  narrow:false, hs:34, bs:20, pad:'22px'},
  {font:'Pattaya',      j:'flex-end',  a:'flex-start', ta:'left',   rot:6,  scrim:'bottom', panel:false, narrow:false, hs:34, bs:20, pad:'22px 26px 40px'},
  {font:'Chonburi',     j:'flex-start',a:'flex-start', ta:'left',   rot:0,  scrim:'left',   panel:false, narrow:true,  hs:36, bs:20, pad:'28px 26px'},
];

function toast(t){const el=$('toast');el.textContent=t;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),1800);}
function track(name){ try{ if(window.goatcounter&&window.goatcounter.count) window.goatcounter.count({path:name,title:name,event:true}); }catch(e){} }
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

function scrimFor(p,color,c2){
  const tint=`radial-gradient(120% 90% at 50% 42%, ${hexA(color,.04)} 0%, ${hexA(c2,.30)} 100%)`;
  const map={
    bottom:`linear-gradient(180deg, rgba(0,0,0,.10) 0%, rgba(0,0,0,0) 38%, rgba(0,0,0,.22) 62%, rgba(0,0,0,.68) 100%)`,
    top:`linear-gradient(0deg, rgba(0,0,0,.06) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,.20) 62%, rgba(0,0,0,.64) 100%)`,
    left:`linear-gradient(90deg, rgba(0,0,0,.66) 0%, rgba(0,0,0,.18) 48%, rgba(0,0,0,0) 72%)`,
    right:`linear-gradient(270deg, rgba(0,0,0,.66) 0%, rgba(0,0,0,.18) 48%, rgba(0,0,0,0) 72%)`,
    center:`radial-gradient(closest-side, rgba(0,0,0,.52) 0%, rgba(0,0,0,.16) 62%, rgba(0,0,0,0) 100%)`,
  };
  return `${map[p]||map.bottom}, ${tint}`;
}

function applyLayout(L,color,c2){
  const c=$('content'), tb=$('textBlock');
  c.style.justifyContent=L.j; c.style.alignItems=L.a; c.style.textAlign=L.ta;
  c.style.inset=(L.pad?'0':'22px'); c.style.padding=L.pad||'0';
  tb.style.transform=L.rot?`rotate(${L.rot}deg)`:'none';
  tb.style.maxWidth=L.narrow?'56%':'92%';
  tb.style.alignItems=(L.ta==='left')?'flex-start':(L.ta==='right')?'flex-end':'center';
  if(L.panel){tb.style.background='rgba(0,0,0,.34)';tb.style.padding='16px 20px';tb.style.borderRadius='16px';
    tb.style.border='1px solid rgba(255,255,255,.22)';tb.style.backdropFilter='blur(3px)';}
  else{tb.style.background='none';tb.style.padding='0';tb.style.border='none';tb.style.backdropFilter='none';}
  $('hello').style.fontFamily=`'${L.font}', sans-serif`;
  $('hello').style.fontSize=L.hs+'px';
  $('bless').style.fontSize=L.bs+'px';
  $('scrim').style.background=scrimFor(L.scrim,color,c2);
}

async function boot(){
  if(REPO.includes('REPO_NAME')){
    $('app').innerHTML=`<div class="msg">⚠️ ยังไม่ได้ตั้งค่า — แก้บรรทัด <code>const REPO</code> ให้เป็นรีโปจริงก่อน</div>`;
    $('dateLine').textContent=''; return;
  }
  try{
    const res=await fetch(`${BASE}/manifest.json?v=${Date.now()}`,{cache:'no-store'});
    if(!res.ok) throw new Error('manifest '+res.status);
    M=await res.json();
  }catch(e){
    $('app').innerHTML=`<div class="msg">ยังไม่มีรูปของวันนี้ 😴<br><br>รอรอบ gen ตอนดึก หรือไปที่ <b>Actions → Run workflow</b> เพื่อสร้างชุดแรก</div>`;
    $('dateLine').textContent=''; return;
  }
  $('dateLine').textContent=M.dateThai||'';
  if(M.isFestival) $('topTitle').textContent=M.headline||'สวัสดีวันนี้';
  order=M.images.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  pos=0; renderShell(); render(); preload();
}

function preload(){ M.images.forEach(src=>{const im=new Image();im.crossOrigin='anonymous';im.src=`${BASE}/${src}?v=${M.version}`;}); }

function activeIdx(){ let g=0; while(rejected.has(order[pos])&&g++<order.length){pos=(pos+1)%order.length;} return order[pos]; }

function renderShell(){
  $('app').innerHTML=`
  <div class="stage">
    <div class="card" id="card">
      <img class="bg" id="bg" crossorigin="anonymous" alt="">
      <div class="scrim" id="scrim"></div>
      <div class="frame">
        ${['tl','tr','bl','br'].map(c=>`<svg class="corner ${c}" viewBox="0 0 50 50"><path d="M2 48 Q2 2 48 2" fill="none" stroke="#fff" stroke-width="1.4"/><path d="M8 48 Q8 8 48 8" fill="none" stroke="#fff" stroke-width="1" opacity=".6"/><circle cx="14" cy="14" r="2.4" fill="#fff"/><path d="M14 14 q10 -4 18 0 q-8 6 -18 0" fill="#fff" opacity=".85"/></svg>`).join('')}
      </div>
      <div class="content" id="content">
        <div id="textBlock">
          <div class="hello" id="hello"></div>
          <div class="bless" id="bless"></div>
          <div class="date" id="cardDate"></div>
        </div>
      </div>
      <div class="pill" id="pill"></div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="next">🔁 เปลี่ยนรูป</button>
      <button class="btn ghost" id="reword">💬 สุ่มคำใหม่</button>
      <button class="btn ghost" id="reject">🗑️ ไม่เอารูปนี้</button>
      <button class="btn ghost" id="copy">📋 คัดลอก</button>
      <button class="btn primary span2" id="dl">⬇ ดาวน์โหลดรูปนี้</button>
    </div>
    <div class="hint">รูปเตรียมไว้ ${M.count} รูป • ฟอนต์/ตำแหน่งสลับอัตโนมัติทุกใบ</div>
  </div>`;
  $('next').onclick=()=>{pos=(pos+1)%order.length;render();};
  $('reword').onclick=()=>{render(true);};
  $('reject').onclick=()=>{ rejected.add(order[pos]);
    if(rejected.size>=order.length){toast('ไม่เหลือรูปแล้ว เริ่มใหม่');rejected.clear();}
    pos=(pos+1)%order.length;render();toast('เอารูปนี้ออกแล้ว'); };
  $('copy').onclick=copyImg;
  $('dl').onclick=download;
}

function render(newWord=false){
  const idx=activeIdx();
  const L=LAYOUTS[(idx+layoutSalt)%LAYOUTS.length];
  $('hello').textContent=M.headline || ('สวัสดีวัน'+M.dayTh);
  $('cardDate').textContent=M.dateThai;
  if(newWord || !$('bless').textContent){
    $('bless').textContent=M.blessings[Math.floor(Math.random()*M.blessings.length)] || 'ขอให้เป็นวันที่ดี';
  }
  applyLayout(L,M.color,M.color2);
  const img=$('bg'); img.style.opacity=0; img.onload=()=>{img.style.opacity=1;};
  img.src=`${BASE}/${M.images[idx]}?v=${M.version}`;
  const shown=order.filter(i=>!rejected.has(i));
  $('pill').textContent=(M.isFestival?M.festival+' • ':'')+`${shown.indexOf(idx)+1}/${shown.length}`;
  placeSparkles();
}

function placeSparkles(){
  document.querySelectorAll('.sparkle').forEach(s=>s.remove());
  const card=$('card');
  for(let i=0;i<7;i++){const s=document.createElement('div');s.className='sparkle';
    s.style.left=(8+Math.random()*84)+'%';s.style.top=(8+Math.random()*84)+'%';
    s.style.opacity=(0.4+Math.random()*0.6);s.style.transform=`scale(${0.6+Math.random()})`;card.appendChild(s);}
}

async function snapshot(){ return await html2canvas($('card'),{useCORS:true,scale:2,backgroundColor:null,logging:false}); }
async function download(){
  const b=$('dl');const t=b.textContent;b.textContent='กำลังบันทึก…';b.disabled=true;
  try{ const c=await snapshot();const a=document.createElement('a');
    a.download=`${(M.headline||'สวัสดี')}.png`;a.href=c.toDataURL('image/png');a.click();toast('บันทึกแล้ว ✓');track('download');
  }catch(e){toast('บันทึกไม่สำเร็จ ลองแคปหน้าจอแทน');}
  finally{b.textContent=t;b.disabled=false;}
}
async function copyImg(){
  try{ const c=await snapshot();
    c.toBlob(async blob=>{ try{ await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]); toast('คัดลอกแล้ว พร้อมแปะใน LINE ✓'); track('copy'); }
      catch{ toast('เบราว์เซอร์นี้คัดลอกรูปไม่ได้ ใช้ดาวน์โหลดแทน'); } },'image/png');
  }catch(e){toast('คัดลอกไม่สำเร็จ');}
}

boot();
</script>
</body>
</html>
